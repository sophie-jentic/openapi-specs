components:
  schemas:
    AiIntegration:
      type: object
      required:
      - id
      - name
      - provider
      - has_api_key
      - enable_default_models
      - function_calling_enabled
      - auth_type
      - scopings
      - created_at
      - updated_at
      - created_by_user_id
      properties:
        id:
          type: string
          description: The integration ID
        name:
          type: string
          description: The integration name
        provider:
          $ref: '#/components/schemas/AiIntegrationProvider'
        has_api_key:
          type: boolean
          description: Whether an API key is configured (the key itself is never returned)
        base_url:
          type: string
          nullable: true
          description: Custom base URL for the provider
        model_names:
          type: array
          nullable: true
          items:
            type: string
          description: Supported model names
        headers:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Custom headers included in requests
        enable_default_models:
          type: boolean
          description: Whether the provider's default model list is enabled
        function_calling_enabled:
          type: boolean
          description: Whether function/tool calling is enabled
        auth_type:
          $ref: '#/components/schemas/AiIntegrationAuthType'
        provider_metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: Provider-specific configuration (AWS or GCP metadata)
        scopings:
          type: array
          items:
            $ref: '#/components/schemas/AiIntegrationScoping'
          description: Visibility scoping rules
        created_at:
          type: string
          format: date-time
          description: When the integration was created
        updated_at:
          type: string
          format: date-time
          description: When the integration was last updated
        created_by_user_id:
          type: string
          description: The user ID of the user who created the integration
      description: 'An AI integration configures access to an external LLM provider
        (e.g. OpenAI,

        Azure OpenAI, AWS Bedrock, Vertex AI). Integrations can be scoped to the entire

        account, a specific organization, or a specific space.

        '
      additionalProperties: false
    AiIntegrationProvider:
      type: string
      enum:
      - openAI
      - azureOpenAI
      - awsBedrock
      - vertexAI
      - anthropic
      - custom
      - nvidiaNim
      - gemini
      description: The AI provider for this integration
    AiIntegrationAuthType:
      type: string
      enum:
      - default
      - proxy_with_headers
      - bearer_token
      description: The authentication method for this integration
    AiIntegrationScoping:
      type: object
      description: Visibility scoping for the integration
      properties:
        organization_id:
          type: string
          nullable: true
          description: Organization global ID. Null means account-wide.
        space_id:
          type: string
          nullable: true
          description: Space global ID. Null means organization-wide (or account-wide
            if organization_id is also null).
    AwsProviderMetadata:
      type: object
      description: AWS Bedrock provider metadata
      required:
      - role_arn
      properties:
        role_arn:
          type: string
          description: AWS IAM role ARN for cross-account access
        external_id:
          type: string
          nullable: true
          description: External ID for the assume-role policy
    GcpProviderMetadata:
      type: object
      description: Vertex AI (GCP) provider metadata
      required:
      - project_id
      - location
      - project_access_label
      properties:
        project_id:
          type: string
          description: GCP project ID
        location:
          type: string
          description: GCP region (e.g. us-central1)
        project_access_label:
          type: string
          description: Display label for the project
    ApiKeyStatus:
      type: string
      enum:
      - active
      - deleted
      description: 'Current status of the API key.

        - active - The key is valid for use.

        - deleted - The key has been deleted by a user.

        '
    ApiKey:
      type: object
      required:
      - id
      - name
      - key_type
      - status
      - redacted_key
      - created_at
      - created_by_user_id
      properties:
        id:
          type: string
          description: Unique identifier for the API key.
        name:
          type: string
          description: User-defined name for the API key.
        description:
          type: string
          description: Optional user-defined description for the API key.
        key_type:
          type: string
          enum:
          - user
          - service
          description: 'Type of the API key.

            - user - Key associated with a specific user.

            - service - Key associated with a bot user for service authentication.

            '
        status:
          $ref: '#/components/schemas/ApiKeyStatus'
        redacted_key:
          type: string
          description: Redacted version of the key suitable for display (e.g., "ak-abc...xyz").
        created_at:
          type: string
          format: date-time
          description: Timestamp when the key was created.
        expires_at:
          type: string
          format: date-time
          description: Optional timestamp when the key will expire.
        created_by_user_id:
          type: string
          description: ID of the user who created the key.
      additionalProperties: false
    ApiKeyCreate:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          maxLength: 256
          description: User-defined name for the API key.
          example: CI pipeline key
        description:
          type: string
          maxLength: 1000
          description: Optional user-defined description for the API key.
          example: Key used by the CI pipeline to upload evaluation results.
        key_type:
          type: string
          enum:
          - user
          - service
          default: user
          description: "Type of the API key to create. Defaults to `user`.\n- user\
            \ - Key that authenticates as the creating user with their full permissions.\n\
            \  `space_id` and `roles` must not be set (returns `400`).\n- service\
            \ - Key scoped to a specific space backed by a dedicated bot user.\n \
            \ Requires `space_id`. All roles default to minimum privilege when omitted.\n"
          example: user
        expires_at:
          type: string
          format: date-time
          description: Optional expiration timestamp. If omitted the key never expires.
          example: '2026-01-01T00:00:00Z'
        space_id:
          type: string
          description: 'ID of the space this service key is scoped to. Required when
            `key_type` is `service`;

            invalid for `user` keys (returns `400`).

            '
          example: U3BhY2UxMjM
        roles:
          description: 'Role assignments for the service key''s bot user. Only valid
            when `key_type` is `service`;

            invalid for `user` keys (returns `400`).

            '
          $ref: '#/components/schemas/ApiKeyRoles'
      additionalProperties: false
    ApiKeyRoles:
      type: object
      description: Role assignments for the bot user created with a service key.
      properties:
        space_role:
          type: string
          enum:
          - admin
          - member
          - read-only
          default: member
          description: 'Role to assign the bot user within the space. Defaults to
            `member` when omitted.

            Must be at or below the caller''s own effective space role.

            '
        org_role:
          type: string
          enum:
          - admin
          - member
          - read-only
          default: read-only
          description: 'Role to assign the bot user within the organization. Defaults
            to `read-only` when

            omitted. Must be at or below the caller''s own organization role.

            '
        account_role:
          type: string
          enum:
          - admin
          - member
          default: member
          description: 'Account-level role to assign the bot user. Defaults to `member`
            when omitted.

            Must be at or below the caller''s own account role.

            '
      additionalProperties: false
    ApiKeyCreated:
      allOf:
      - $ref: '#/components/schemas/ApiKey'
      - type: object
        required:
        - key
        properties:
          key:
            type: string
            description: 'The full API key value. **Only returned once** at creation
              or refresh time.

              Store it securely — it cannot be retrieved again.

              '
    Role:
      type: object
      required:
      - id
      - name
      - permissions
      - is_predefined
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the role.
        name:
          type: string
          description: Human-readable name of the role.
        description:
          type: string
          description: A brief description of the role's purpose.
        permissions:
          type: array
          items:
            type: string
          description: 'List of permissions granted by this role. Each value corresponds
            to a

            permission identifier (e.g. `PROJECT_READ`, `DATASET_CREATE`).

            '
        is_predefined:
          type: boolean
          description: 'Whether this role is a system-defined predefined role. Predefined
            roles

            cannot be updated or deleted.

            '
        created_at:
          type: string
          format: date-time
          description: Timestamp when the role was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the role was last updated.
      additionalProperties: false
    RoleCreate:
      type: object
      required:
      - name
      - permissions
      properties:
        name:
          type: string
          maxLength: 255
          description: Human-readable name for the role. Must be unique within the
            account.
          example: Data Scientist
        description:
          type: string
          maxLength: 1000
          description: Optional description of the role's purpose. Omitted from the
            response if empty.
          example: Can read and create datasets and experiments but cannot manage
            spaces.
        permissions:
          type: array
          minItems: 1
          items:
            type: string
          description: 'List of permissions to grant. At least one permission is required.
            Each value

            must be a valid permission identifier (e.g. `PROJECT_READ`, `DATASET_CREATE`).

            '
          example:
          - PROJECT_READ
          - DATASET_READ
          - DATASET_CREATE
          - EXPERIMENT_READ
          - EXPERIMENT_CREATE
      additionalProperties: false
    RoleUpdate:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          maxLength: 255
          description: Updated name for the role. Must be unique within the account.
        description:
          type: string
          maxLength: 1000
          description: Updated description of the role.
        permissions:
          type: array
          minItems: 1
          items:
            type: string
          description: 'Replacement set of permissions. When provided, the existing
            permissions are

            fully replaced. Each value must be a valid permission identifier.

            '
      additionalProperties: false
    AnnotationConfig:
      type: object
      discriminator:
        propertyName: type
        mapping:
          continuous: '#/components/schemas/ContinuousAnnotationConfig'
          categorical: '#/components/schemas/CategoricalAnnotationConfig'
          freeform: '#/components/schemas/FreeformAnnotationConfig'
      oneOf:
      - $ref: '#/components/schemas/ContinuousAnnotationConfig'
      - $ref: '#/components/schemas/CategoricalAnnotationConfig'
      - $ref: '#/components/schemas/FreeformAnnotationConfig'
    AnnotationQueue:
      type: object
      required:
      - id
      - name
      - space_id
      - annotators
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: The unique identifier for the annotation queue
          example: aq_abc123
        name:
          type: string
          description: The name of the annotation queue
          example: Quality Review Queue
        space_id:
          type: string
          description: The space id the annotation queue belongs to
          example: spc_xyz789
        instructions:
          type: string
          nullable: true
          description: The instructions for the annotation queue
          example: Review each response for accuracy and helpfulness
        annotation_configs:
          type: array
          items:
            $ref: '#/components/schemas/AnnotationConfig'
          description: The annotation configs associated with this queue
        annotators:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatorUser'
          description: Users assigned as annotators to this queue
        created_at:
          type: string
          format: date-time
          description: The timestamp for when the annotation queue was created
          example: '2024-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: The timestamp for when the annotation queue was last updated
          example: '2024-01-20T14:45:00Z'
      additionalProperties: false
    AnnotationQueueAssignedUser:
      type: object
      description: A user assigned to a record with their completion status
      required:
      - user
      - completion_status
      properties:
        user:
          $ref: '#/components/schemas/AnnotatorUser'
        completion_status:
          type: string
          enum:
          - pending
          - completed
          description: The completion status for this user on this record
      additionalProperties: false
    AnnotationQueueRecord:
      type: object
      description: A record in an annotation queue with its data
      required:
      - id
      - annotation_queue_id
      - source_type
      - data
      - annotations
      - evaluations
      - assigned_users
      properties:
        id:
          type: string
          description: The unique identifier for the record
        annotation_queue_id:
          type: string
          description: The annotation queue this record belongs to
        source_type:
          type: string
          enum:
          - spans
          - dataset
          description: The source type of the record (spans or dataset)
        data:
          type: object
          additionalProperties: true
          description: Record data as flat key-value pairs containing span or dataset
            fields. Does not include annotation or evaluation columns.
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/Annotation'
          description: Human annotations on this record
        evaluations:
          type: array
          items:
            $ref: '#/components/schemas/Evaluation'
          description: Evaluation results on this record
        assigned_users:
          type: array
          items:
            $ref: '#/components/schemas/AnnotationQueueAssignedUser'
          description: Users assigned to this record
      additionalProperties: false
    UpdateAnnotationQueueRequestBody:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: 'The name of the annotation queue. Must be unique within the
            space.

            '
          example: Updated Queue Name
        instructions:
          type: string
          maxLength: 5000
          description: 'The instructions for annotators working on this queue.

            Send an empty string to clear the instructions.

            '
          example: Review each response for accuracy and helpfulness
        annotation_config_ids:
          type: array
          items:
            type: string
          description: 'The full list of annotation config IDs to associate with this
            queue.

            This replaces all existing annotation config associations.

            All annotation configs must belong to the same space as the queue.

            '
          example:
          - ac_abc123
          - ac_def456
        annotator_emails:
          type: array
          items:
            type: string
            format: email
          description: 'The full list of user emails to assign to this queue.

            This replaces all existing user assignments.

            All users must have an active account and access to the queue''s space.

            '
          example:
          - reviewer@example.com
          - annotator@example.com
    CreateAnnotationQueueRequestBody:
      type: object
      required:
      - name
      - space_id
      - annotation_config_ids
      - annotator_emails
      properties:
        name:
          type: string
          maxLength: 255
          description: The name of the annotation queue. Must be unique within the
            space for active queues.
          example: Quality Review Queue
        space_id:
          type: string
          description: The space ID that the annotation queue belongs to
          example: spc_xyz789
        instructions:
          type: string
          maxLength: 5000
          description: Instructions for annotators working on this queue
          example: Review each response for accuracy and helpfulness
        annotation_config_ids:
          type: array
          items:
            type: string
          minItems: 1
          description: IDs of annotation configs to associate with this queue. All
            configs must belong to the same space.
          example:
          - ac_abc123
          - ac_def456
        annotator_emails:
          type: array
          items:
            type: string
            format: email
          minItems: 1
          description: Email addresses of annotators to assign to the queue. Emails
            are resolved to user IDs server-side.
          example:
          - annotator1@example.com
          - annotator2@example.com
        assignment_method:
          type: string
          enum:
          - all
          - random
          default: all
          description: 'How records are assigned to annotators. Defaults to "all".

            - `all`: Every annotator is assigned to every record.

            - `random`: Each record is randomly assigned to one annotator.

            '
        record_sources:
          type: array
          maxItems: 2
          items:
            $ref: '#/components/schemas/AnnotationQueueRecordInput'
          description: Record sources to add to the annotation queue on creation.
            At most 2 record sources (projects or datasets) may be provided in a single
            create request. Additional records from other sources can be added after
            creation.
      additionalProperties: false
    AnnotationQueueRecordInput:
      oneOf:
      - $ref: '#/components/schemas/AnnotationQueueExampleRecordInput'
      - $ref: '#/components/schemas/AnnotationQueueSpanRecordInput'
      discriminator:
        propertyName: record_type
        mapping:
          example: '#/components/schemas/AnnotationQueueExampleRecordInput'
          span: '#/components/schemas/AnnotationQueueSpanRecordInput'
    AnnotationQueueExampleRecordInput:
      type: object
      required:
      - record_type
      - dataset_id
      properties:
        record_type:
          type: string
          enum:
          - example
          description: The type of record
        dataset_id:
          type: string
          description: The dataset ID these examples belong to
        dataset_version_id:
          type: string
          description: 'Optional. The specific dataset version to use. If omitted,
            the latest version is used.

            '
        example_ids:
          type: array
          items:
            type: string
          description: 'Optional. List of example IDs within the dataset to add to
            the queue. If omitted, all examples in the dataset (or dataset version)
            are added.

            '
      additionalProperties: false
    AnnotationQueueSpanRecordInput:
      type: object
      required:
      - record_type
      - project_id
      - span_ids
      - start_time
      - end_time
      properties:
        record_type:
          type: string
          enum:
          - span
          description: The type of record
        project_id:
          type: string
          description: The project ID these spans belong to
        start_time:
          type: string
          format: date-time
          description: 'Start of the time range to search for spans in Druid. The
            range (end_time - start_time) must not exceed 7 days.

            '
        end_time:
          type: string
          format: date-time
          description: 'End of the time range. Must be after start_time.

            '
        span_ids:
          type: array
          items:
            type: string
          minItems: 1
          description: List of span IDs to add to the queue
      additionalProperties: false
    DeleteAnnotationQueueRecordsRequestBody:
      type: object
      required:
      - record_ids
      properties:
        record_ids:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/Id'
          description: The IDs of the annotation queue records to delete.
      additionalProperties: false
    AddAnnotationQueueRecordsRequestBody:
      type: object
      required:
      - record_sources
      properties:
        record_sources:
          type: array
          minItems: 1
          maxItems: 2
          items:
            $ref: '#/components/schemas/AnnotationQueueRecordInput'
          description: Record sources to add to the annotation queue. At most 2 record
            sources (projects or datasets) may be provided in a single request.
      additionalProperties: false
    Project:
      type: object
      required:
      - id
      - name
      - space_id
      - created_at
      properties:
        id:
          type: string
          description: The project ID
        name:
          type: string
          description: The project name
        space_id:
          type: string
          description: The space ID the project belongs to
        created_at:
          type: string
          format: date-time
          description: When the project was created
      description: 'A project represents an LLM application and serves as the primary
        container for observability data. Each project collects traces and spans that
        capture the execution flow of your application, enabling you to debug issues,
        monitor latency, and analyze token usage.

        Projects belong to a space and provide a centralized view of your application''s
        performance. Use projects to organize related traces, run experiments against
        datasets, and track improvements over time.

        '
      additionalProperties: false
    SpanContext:
      type: object
      required:
      - trace_id
      - span_id
      properties:
        trace_id:
          type: string
          description: Unique identifier for the trace this span belongs to
        span_id:
          type: string
          description: Unique identifier for the span
      additionalProperties: false
    SpanEvent:
      type: object
      required:
      - name
      - timestamp
      properties:
        name:
          type: string
          description: Name of the event
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the event occurred
        attributes:
          type: object
          additionalProperties: true
          description: Key-value pairs of event attributes
      additionalProperties: false
    Span:
      type: object
      required:
      - kind
      - name
      - context
      - start_time
      - end_time
      properties:
        name:
          type: string
          description: Name of the span
        context:
          $ref: '#/components/schemas/SpanContext'
          description: The trace and span identifiers for this span
        kind:
          type: string
          description: The kind of span (e.g., TOOL, CHAIN, LLM, RETRIEVER, EMBEDDING)
        parent_id:
          type: string
          description: ID of the parent span
        start_time:
          type: string
          format: date-time
          description: Timestamp when the span started
        end_time:
          type: string
          format: date-time
          description: Timestamp when the span ended
        status_code:
          type: string
          enum:
          - OK
          - ERROR
          - UNSET
          description: Status code of the span
        status_message:
          type: string
          description: Status message associated with the span
        attributes:
          type: object
          additionalProperties: true
          description: Key-value pairs of span attributes
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/Annotation'
          description: List of human annotations on this span
        evaluations:
          type: array
          items:
            $ref: '#/components/schemas/Evaluation'
          description: List of evaluation results on this span
        events:
          type: array
          items:
            $ref: '#/components/schemas/SpanEvent'
          description: List of events that occurred during the span
      description: 'A Span represents a single unit of work within a distributed trace
        for an LLM application.

        It captures the operation’s input and output, start and end times, and a span
        kind indicating its role (such as LLM, Tool, Agent, Retriever, Chain, or Embedding).

        Spans are hierarchically related and combine to form a trace, enabling end-to-end
        visibility into request execution, performance bottlenecks, and errors across
        complex LLM pipelines.

        '
      additionalProperties: false
    Prompt:
      type: object
      required:
      - id
      - name
      - space_id
      - created_at
      - updated_at
      - created_by_user_id
      properties:
        id:
          type: string
          description: The prompt ID
        name:
          type: string
          description: The prompt name
        description:
          type: string
          nullable: true
          description: The prompt description
        space_id:
          type: string
          description: The space ID the prompt belongs to
        created_at:
          type: string
          format: date-time
          description: When the prompt was created
        updated_at:
          type: string
          format: date-time
          description: When the prompt was last updated
        created_by_user_id:
          type: string
          description: The user ID of the user who created the prompt
      description: 'A prompt is a reusable template for LLM interactions. Prompts
        can be versioned

        and labeled to track changes over time. Use prompts to standardize how you

        interact with LLMs across your application.

        '
      additionalProperties: false
    PromptVersion:
      type: object
      required:
      - id
      - prompt_id
      - commit_hash
      - commit_message
      - messages
      - input_variable_format
      - provider
      - model
      - created_at
      - created_by_user_id
      properties:
        id:
          type: string
          description: The prompt version ID
        prompt_id:
          type: string
          description: The prompt ID this version belongs to
        commit_hash:
          type: string
          description: The commit hash of this version
        commit_message:
          type: string
          description: The commit message describing the changes in this version
        messages:
          type: array
          description: The messages that make up the prompt template
          items:
            $ref: '#/components/schemas/LLMMessage'
        input_variable_format:
          $ref: '#/components/schemas/InputVariableFormat'
        provider:
          $ref: '#/components/schemas/LlmProvider'
        model:
          type: string
          description: The model to use for the call
        invocation_params:
          $ref: '#/components/schemas/InvocationParams'
        provider_params:
          $ref: '#/components/schemas/ProviderParams'
        tool_config:
          $ref: '#/components/schemas/ToolConfig'
        created_at:
          type: string
          format: date-time
          description: When the version was created
        created_by_user_id:
          type: string
          description: The user ID of the user who created this version
        labels:
          type: array
          items:
            type: string
          description: Label names currently pointing to this version (e.g., "production",
            "staging")
      description: 'A prompt version represents a specific snapshot of a prompt''s
        configuration.

        Each version captures the messages, model settings, and parameters at a point

        in time. Versions are immutable once created and are identified by a commit
        hash.

        '
      additionalProperties: false
    InputVariableFormat:
      type: string
      enum:
      - f_string
      - mustache
      - none
      description: 'The format for input variables in the prompt messages. There is
        no default; this field is required.

        - `f_string`: Single curly braces ({variable_name})

        - `mustache`: Double curly braces ({{variable_name}})

        - `none`: No input variable parsing

        '
    LlmProvider:
      type: string
      enum:
      - openAI
      - azureOpenAI
      - awsBedrock
      - vertexAI
      - custom
      description: The LLM provider to use
    MessageRole:
      type: string
      enum:
      - user
      - assistant
      - system
      - tool
      description: The role of the message author
    ToolCallType:
      type: string
      enum:
      - function
      description: The type of tool call
    ResponseFormatType:
      type: string
      enum:
      - text
      - json_object
      - json_schema
      description: The response format type
    ToolCallFunction:
      type: object
      description: The function to call
      required:
      - name
      - arguments
      properties:
        name:
          type: string
          description: The name of the function
        arguments:
          type: string
          description: The arguments to the function as a JSON string
    ToolCall:
      type: object
      description: A tool call generated by the model
      required:
      - type
      - function
      properties:
        id:
          type: string
          description: The ID of the tool call
        type:
          $ref: '#/components/schemas/ToolCallType'
        function:
          $ref: '#/components/schemas/ToolCallFunction'
    LLMMessage:
      type: object
      description: A message in the prompt template
      required:
      - role
      properties:
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          type: string
          nullable: true
          description: The content of the message
        tool_call_id:
          type: string
          description: The ID of the tool call this message is responding to
        tool_calls:
          type: array
          description: Tool calls generated by the model
          items:
            $ref: '#/components/schemas/ToolCall'
    ResponseFormat:
      type: object
      description: Response format configuration
      properties:
        type:
          $ref: '#/components/schemas/ResponseFormatType'
        json_schema:
          type: object
          description: JSON schema configuration (when type is json_schema)
          properties:
            name:
              type: string
              description: The name of the JSON schema
            description:
              type: string
              description: A description of the JSON schema
            schema:
              type: object
              description: The JSON schema object
            strict:
              type: boolean
              description: Whether to enforce strict schema validation
    ToolConfig:
      type: object
      description: Tool configuration for the LLM invocation
      properties:
        tools:
          type: array
          description: List of tool definitions available to the model
          items:
            type: object
        tool_choice:
          description: Tool choice configuration
