openapi: 3.0.3
info:
  title: Arize REST API
  version: 2.0.0
  description: 'API specification for the backend data server. The API is hosted globally

    at https://api.arize.com/v2 or in your own environment.

    '
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: API Support
servers:
- description: Global
  url: https://api.arize.com
- description: Regional
  url: https://api.{region}.arize.com
  variables:
    region:
      default: eu-west-1a
      enum:
      - eu-west-1a
      - ca-central-1a
- description: Custom Host
  url: https://{host}
  variables:
    host:
      default: api.arize.com
security:
- bearerAuth: []
tags:
- name: AI Integrations
  description: 'AI integrations configure access to external LLM providers (e.g. OpenAI,

    Azure OpenAI, AWS Bedrock, Vertex AI). Integrations can be scoped to the

    entire account, a specific organization, or a specific space.

    '
- name: Annotation Configs
  description: 'Annotation configs allow you to define consistent annotation schemas
    that

    can be reused across your workspace, ensuring evaluations are structured and

    comparable over time.

    '
- name: Annotation Queues
  description: 'Annotation queues help you organize and manage human evaluation workflows.

    Use queues to assign spans or examples to annotators for review and labeling.

    '
- name: API Keys
  description: 'API keys are used to authenticate requests to the Arize API. List
    your keys

    to view metadata; the raw secret is never returned after creation.

    '
- name: Datasets
  description: 'Datasets are structured, version-controlled example collections you
    use to

    run, evaluate, and track LLM experiments.

    '
- name: Evaluators
  description: 'Evaluators are reusable evaluation configurations used to assess the
    quality

    of LLM outputs. They can be template-based (using LLM judges) or code-based.

    '
- name: Experiments
  description: 'Experiments let you systematically test prompt/model changes using
    datasets,

    tasks, and evaluators.

    '
- name: Projects
  description: 'Projects represent LLM applications being monitored in Arize where
    you can

    observe traces and spans.

    '
- name: Prompts
  description: 'Prompts are reusable, versioned templates for LLM interactions. Use
    prompts

    to standardize and manage how you interact with LLMs across your application.

    '
- name: Roles
  description: 'Roles define sets of permissions that can be assigned to users within
    an

    account. Create custom roles to tailor access control to your team''s needs.

    '
- name: Spaces
  description: 'Spaces are containers within an organization for grouping related
    projects,

    datasets, and experiments, enabling collaboration or isolated experimentation

    with role-based access control.

    '
- name: Spans
  description: 'Spans represent individual operations within a trace. A span captures
    the

    timing, status, and attributes of a single operation in your application.

    '
- name: Tasks
  description: 'Tasks are configurable units of work that tie one or more evaluators
    to a

    data source (project or dataset). Use tasks to automate evaluation of LLM

    outputs, with support for continuous evaluation and backfill runs.

    '
paths:
  /v2/ai-integrations:
    get:
      tags:
      - AI Integrations
      operationId: ai_integrations_list
      x-mint:
        metadata:
          tag: alpha
      summary: List AI integrations
      description: 'List AI integrations the user has access to.


        <Warning>This endpoint is in alpha, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>

        '
      parameters:
      - $ref: '#/components/parameters/SpaceIdQueryParam'
      - $ref: '#/components/parameters/SpaceNameQueryParam'
      - $ref: '#/components/parameters/NameSearchQueryParam'
      - $ref: '#/components/parameters/LimitQueryParamMax100'
      - $ref: '#/components/parameters/CursorQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/AiIntegrationList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    post:
      tags:
      - AI Integrations
      operationId: ai_integrations_create
      x-mint:
        metadata:
          tag: alpha
      summary: Create an AI integration
      description: "Create a new AI integration for an external LLM provider.\n\n\
        **Payload Requirements**\n- `name` and `provider` are required.\n- The integration\
        \ name must be unique within the account.\n- `provider` must be one of: `openAI`,\
        \ `azureOpenAI`, `awsBedrock`, `vertexAI`, `anthropic`, `custom`.\n- If `scopings`\
        \ is omitted, the integration defaults to account-wide visibility.\n- `enable_default_models`\
        \ defaults to `false` if not provided.\n- `function_calling_enabled` defaults\
        \ to `true` if not provided.\n- `auth_type` defaults to `default` if not provided.\n\
        - For `awsBedrock` provider, `provider_metadata` must include `role_arn`.\n\
        - For `vertexAI` provider, `provider_metadata` must include `project_id`,\
        \ `location`, and `project_access_label`.\n\n**Valid example**\n```json\n\
        {\n  \"name\": \"Production OpenAI\",\n  \"provider\": \"openAI\",\n  \"api_key\"\
        : \"sk-abc123...\",\n  \"model_names\": [\"gpt-4\", \"gpt-4o\"],\n  \"enable_default_models\"\
        : true\n}\n```\n\n**Invalid example** (missing required `provider`)\n```json\n\
        {\n  \"name\": \"My Integration\"\n}\n```\n\n<Warning>This endpoint is in\
        \ alpha, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>\n"
      requestBody:
        $ref: '#/components/requestBodies/CreateAiIntegrationRequestBody'
      responses:
        '201':
          $ref: '#/components/responses/AiIntegration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /v2/ai-integrations/{integration_id}:
    get:
      tags:
      - AI Integrations
      operationId: ai_integrations_get
      x-mint:
        metadata:
          tag: alpha
      summary: Get an AI integration
      description: 'Get a specific AI integration by its ID.


        <Warning>This endpoint is in alpha, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>

        '
      parameters:
      - $ref: '#/components/parameters/AiIntegrationIdPathParam'
      - name: integration_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/AiIntegration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    patch:
      tags:
      - AI Integrations
      operationId: ai_integrations_update
      x-mint:
        metadata:
          tag: alpha
      summary: Update an AI integration
      description: "Update an AI integration's configuration. At least one field must\
        \ be provided.\nOmitted fields are left unchanged.\n\n**Payload Requirements**\n\
        - At least one of the updatable fields must be provided.\n- `name`, if provided,\
        \ must be unique within the account.\n- `api_key` can be set to `null` to\
        \ remove the existing key, or omitted to keep it unchanged.\n- `scopings`,\
        \ if provided, replaces all existing scoping rules.\n- `provider_metadata`,\
        \ if provided, replaces existing metadata. Set to `null` to remove.\n\n**Valid\
        \ example**\n```json\n{\n  \"name\": \"Updated Integration\",\n  \"model_names\"\
        : [\"gpt-4o\", \"gpt-4o-mini\"]\n}\n```\n\n**Invalid example** (empty body)\n\
        ```json\n{}\n```\n\n<Warning>This endpoint is in alpha, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>\n"
      parameters:
      - $ref: '#/components/parameters/AiIntegrationIdPathParam'
      - name: integration_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        $ref: '#/components/requestBodies/UpdateAiIntegrationRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/AiIntegration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    delete:
      tags:
      - AI Integrations
      operationId: ai_integrations_delete
      x-mint:
        metadata:
          tag: alpha
      summary: Delete an AI integration
      description: 'Delete an AI integration by its ID. This operation is irreversible.


        <Warning>This endpoint is in alpha, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>

        '
      parameters:
      - $ref: '#/components/parameters/AiIntegrationIdPathParam'
      - name: integration_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          $ref: '#/components/responses/AiIntegrationDeleted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /v2/annotation-configs:
    get:
      tags:
      - Annotation Configs
      operationId: annotation_configs_list
      x-optic-no-examples: true
      x-mint:
        metadata:
          tag: beta
      summary: List annotation configs
      description: 'List annotation configs the user has access to.


        <Note>This endpoint is in beta, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Note>

        '
      parameters:
      - $ref: '#/components/parameters/SpaceIdQueryParam'
      - $ref: '#/components/parameters/SpaceNameQueryParam'
      - $ref: '#/components/parameters/NameSearchQueryParam'
      - $ref: '#/components/parameters/LimitQueryParamMax100'
      - $ref: '#/components/parameters/CursorQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/AnnotationConfigList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    post:
      tags:
      - Annotation Configs
      operationId: annotation_configs_create
      x-optic-no-examples: true
      x-mint:
        metadata:
          tag: beta
      summary: Create an annotation config
      description: "Create a new annotation config.\n\n**Payload Requirements**\n\
        - The annotation config name must be unique within the given space.\n\n**Valid\
        \ example**\n```json\n{\n  \"name\": \"my-annotation-config\",\n  \"space_id\"\
        : \"spc_123\",\n  \"annotation_config_type\": \"categorical\",\n  \"values\"\
        : [\n    {\n      \"label\": \"value1\",\n      \"score\": 0\n    },\n   \
        \ {\n      \"label\": \"value2\",\n      \"score\": 1\n    }\n  ],\n  \"optimization_direction\"\
        : \"maximize\"\n}\n```\n\n<Note>This endpoint is in beta, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Note>\n"
      requestBody:
        $ref: '#/components/requestBodies/CreateAnnotationConfigRequestBody'
      responses:
        '201':
          $ref: '#/components/responses/AnnotationConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /v2/annotation-configs/{annotation_config_id}:
    get:
      tags:
      - Annotation Configs
      operationId: annotation_configs_get
      x-optic-no-examples: true
      x-mint:
        metadata:
          tag: beta
      summary: Get an annotation config
      description: 'Get an annotation config object by its ID.


        <Note>This endpoint is in beta, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Note>

        '
      parameters:
      - $ref: '#/components/parameters/AnnotationConfigIdPathParam'
      - name: annotation_config_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/AnnotationConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    delete:
      tags:
      - Annotation Configs
      operationId: annotation_configs_delete
      x-mint:
        metadata:
          tag: beta
      summary: Delete an annotation config
      description: 'Delete an annotation config by its ID. This operation is irreversible.


        <Note>This endpoint is in beta, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Note>

        '
      parameters:
      - $ref: '#/components/parameters/AnnotationConfigIdPathParam'
      - name: annotation_config_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          $ref: '#/components/responses/AnnotationConfigDeleted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /v2/annotation-queues:
    get:
      tags:
      - Annotation Queues
      operationId: annotation_queues_list
      x-optic-no-examples: true
      x-mint:
        metadata:
          tag: alpha
      summary: List annotation queues
      description: 'List annotation queues the user has access to.


        <Warning>This endpoint is in alpha, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>

        '
      parameters:
      - $ref: '#/components/parameters/SpaceIdQueryParam'
      - $ref: '#/components/parameters/SpaceNameQueryParam'
      - $ref: '#/components/parameters/NameSearchQueryParam'
      - $ref: '#/components/parameters/LimitQueryParamMax100'
      - $ref: '#/components/parameters/CursorQueryParam'
      responses:
        '200':
          $ref: '#/components/responses/AnnotationQueueList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    post:
      tags:
      - Annotation Queues
      operationId: annotation_queues_create
      x-optic-no-examples: true
      x-mint:
        metadata:
          tag: alpha
      summary: Create an annotation queue
      description: "Create a new annotation queue.\n\n**Payload Requirements**\n-\
        \ The annotation queue name must be unique within the given space (among active\
        \ queues).\n- At least one `annotation_config_id` is required, and all configs\
        \ must belong to the specified space.\n- Do not include system-managed fields\
        \ on input: `id`, `created_at`, `updated_at`.\n- If `assignment_method` is\
        \ not provided, it defaults to `\"all\"`.\n- If `annotator_emails` are provided,\
        \ all emails must resolve to existing users with access to the space.\n\n\
        **Valid example**\n```json\n{\n  \"name\": \"Quality Review Queue\",\n  \"\
        space_id\": \"spc_xyz789\",\n  \"annotation_config_ids\": [\"ac_abc123\"],\n\
        \  \"assignment_method\": \"all\"\n}\n```\n\n**Valid example with records**\n\
        ```json\n{\n  \"name\": \"Quality Review Queue\",\n  \"space_id\": \"spc_xyz789\"\
        ,\n  \"annotation_config_ids\": [\"ac_abc123\"],\n  \"annotator_emails\":\
        \ [\"reviewer@example.com\"],\n  \"records\": [\n    {\"record_type\": \"\
        span\", \"project_id\": \"prj_abc\", \"start_time\": \"2024-01-15T00:00:00Z\"\
        , \"end_time\": \"2024-01-16T00:00:00Z\", \"span_ids\": [\"span_001\"]},\n\
        \    {\"record_type\": \"example\", \"dataset_id\": \"ds_xyz\", \"example_ids\"\
        : [\"ex_001\", \"ex_002\"]}\n  ]\n}\n```\n\n**Invalid example** (missing required\
        \ annotation_config_ids)\n```json\n{\n  \"name\": \"My Queue\",\n  \"space_id\"\
        : \"spc_xyz789\"\n}\n```\n\n<Warning>This endpoint is in alpha, read more\
        \ [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>\n"
      requestBody:
        $ref: '#/components/requestBodies/CreateAnnotationQueueRequestBody'
      responses:
        '201':
          $ref: '#/components/responses/AnnotationQueueCreate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /v2/annotation-queues/{annotation_queue_id}:
    patch:
      tags:
      - Annotation Queues
      operationId: annotation_queues_update
      x-mint:
        metadata:
          tag: alpha
      summary: Update an annotation queue
      description: 'Update an annotation queue by its ID. At least one field must
        be provided.


        **Payload Requirements:**

        - At least one of `name`, `instructions`, `annotation_config_ids`, or `annotator_emails`
        must be provided

        - `name` must be unique within the space (409 Conflict if duplicate)

        - `annotation_config_ids` replaces all existing config associations; all configs
        must belong to the same space as the queue

        - `annotator_emails` replaces all existing user assignments; all users must
        have active accounts


        <Warning>This endpoint is in alpha, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>

        '
      parameters:
      - $ref: '#/components/parameters/AnnotationQueueIdPathParam'
      - name: annotation_queue_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        $ref: '#/components/requestBodies/UpdateAnnotationQueueRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/AnnotationQueueUpdated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    get:
      tags:
      - Annotation Queues
      operationId: annotation_queues_get
      x-optic-no-examples: true
      x-mint:
        metadata:
          tag: alpha
      summary: Get an annotation queue
      description: 'Get an annotation queue object by its ID.


        This includes the annotation queue''s annotation configs, which define the

        structure of annotations that can be created in this queue.


        This endpoint does not include queue records or annotation progress. To

        manage records in a queue, use the Annotation Queue Items endpoints.


        <Warning>This endpoint is in alpha, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>

        '
      parameters:
      - $ref: '#/components/parameters/AnnotationQueueIdPathParam'
      - name: annotation_queue_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/AnnotationQueue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    delete:
      tags:
      - Annotation Queues
      operationId: annotation_queues_delete
      x-mint:
        metadata:
          tag: alpha
      summary: Delete an annotation queue
      description: 'Delete an annotation queue by its ID. This operation is irreversible.


        <Warning>This endpoint is in alpha, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>

        '
      parameters:
      - $ref: '#/components/parameters/AnnotationQueueIdPathParam'
      - name: annotation_queue_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          $ref: '#/components/responses/AnnotationQueueDeleted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /v2/annotation-queues/{annotation_queue_id}/records:
    post:
      tags:
      - Annotation Queues
      operationId: annotation_queues_records_create
      x-optic-no-examples: true
      x-mint:
        metadata:
          tag: alpha
      summary: Create annotation queue records
      description: "Add new records from either spans (a project) or from dataset\
        \ examples to an existing annotation queue.\n\n**Payload Requirements**\n\
        \  - At least one record source is required.\n  - At most 2 record sources\
        \ are allowed per request\n  - For span record source: `start_time` must be\
        \ before `end_time`, and the range must not exceed 7 days.\n  - For dataset\
        \ record source: all `example_ids` must be non-empty strings.\n  - For spans\
        \ record source: all `span_ids` must be non-empty strings.\n  - At most 500\
        \ records total may be added in one request\n\n<Note>If no example_ids are\
        \ provided for a dataset record source, all examples in the dataset will be\
        \ added to the queue.</Note>\n\n<Warning>This endpoint is in alpha, read more\
        \ [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>\n"
      parameters:
      - $ref: '#/components/parameters/AnnotationQueueIdPathParam'
      - name: annotation_queue_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        $ref: '#/components/requestBodies/AddAnnotationQueueRecordsRequestBody'
      responses:
        '201':
          $ref: '#/components/responses/AnnotationQueueRecordCreate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    get:
      tags:
      - Annotation Queues
      operationId: annotation_queue_records_list
      x-mint:
        metadata:
          tag: alpha
      summary: List annotation queue records
      description: 'List the records in an annotation queue with their data and annotations.


        Each record includes:

        - The record''s data as flat key-value pairs

        - Any annotations that have been added to the record

        - The users assigned to annotate the record and their completion status


        **Pagination**:

        - Response includes `pagination` with `has_more` and `next_cursor`.

        - Use cursor-based pagination by passing the returned `next_cursor`

        value as the `cursor` query parameter in subsequent requests.


        <Warning>This endpoint is in alpha, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Warning>

        '
      parameters:
      - $ref: '#/components/parameters/AnnotationQueueIdPathParam'
      - $ref: '#/components/parameters/CursorQueryParam'
      - $ref: '#/components/parameters/LimitQueryParamMax500'
      - name: annotation_queue_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/AnnotationQueueRecordList'
        '400':
