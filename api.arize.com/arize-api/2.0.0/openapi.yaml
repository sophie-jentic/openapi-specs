        \ of Spain?\",\n      \"answer\": \"Madrid\",\n      \"topic\": \"geography\"\
        \n    },\n  ]\n}\n```\n\n**Invalid example** ('id' not allowed on create)\n\
        ```json\n{\n  \"name\": \"my-dataset\",\n  \"space_id\": \"spc_123\",\n  \"\
        examples\": [\n    {\n      \"id\": \"ex_1\",\n      \"input\": \"Hello\"\n\
        \    }\n  ]\n}\n```\n\n<Note>This endpoint is in beta, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Note>\n"
