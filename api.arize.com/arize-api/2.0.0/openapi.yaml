      summary: Create a dataset
      description: "Create a new dataset with JSON examples. Empty datasets are not\
        \ allowed.\n\n**Payload Requirements**\n- The dataset name must be unique\
        \ within the given space.\n- Each item in `examples[]` may contain **any user-defined\
        \ fields**.\n- Do not include system-managed fields on input: `id`, `created_at`,\
