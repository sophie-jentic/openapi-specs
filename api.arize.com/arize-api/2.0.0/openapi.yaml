      - updated_at
      - created_by_user_id
      - version
      properties:
        id:
          type: string
          description: The prompt ID
        name:
          type: string
          description: The prompt name
        description:
          type: string
          nullable: true
          description: The prompt description
        space_id:
          type: string
          description: The space ID the prompt belongs to
        created_at:
          type: string
          format: date-time
          description: When the prompt was created
        updated_at:
          type: string
          format: date-time
          description: When the prompt was last updated
        created_by_user_id:
          type: string
