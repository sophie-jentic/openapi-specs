        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    patch:
      tags:
      - Datasets
      operationId: datasets_examples_update
      x-mint:
        metadata:
          tag: beta
      summary: Update existing examples in a dataset
      description: "Updates existing dataset examples by matching their `id` field.\n\
        \nan example ID does not match any existing example in the dataset\nversion,\
        \ it will be ignored. In other words, only examples with IDs\nthat already\
        \ exist will be updated. To add new examples, use the\nInsert Dataset Examples\
        \ endpoint.\n\nAdding columns that do not exist in the dataset schema is allowed,\
        \ but\nremoving existing columns is not.\n\nOptionally, the update can create\
        \ a new version of the dataset. In\nthis case, the outcome of the update will\
        \ be reflected only in the new\nversion, while the previous version remains\
        \ unchanged. If a new\nversion is not created, the updates will be applied\
        \ directly (in place)\nto the specified version.\n\n**Payload Requirements**\n\
        - Each item in `examples[]` may contain any user-defined fields.\n- Each item\
        \ in `examples[]` must include the `id` field to identify the\nexample to\
        \ update.\n- Do not include system-managed fields on input: `created_at`,\
        \ `updated_at`.\nRequests that contain these fields in any example will be\
        \ rejected.\n- Each example must contain at least one property (i.e., `{}`\
        \ is invalid).\n\n**Valid example** (create)\n```json\n{\n  \"examples\":\
        \ [\n    {\n      \"id\": \"ex_001\",\n      \"question\": \"What is 2+2?\"\
        ,\n      \"answer\": \"4\",\n      \"topic\": \"math\"\n    }\n  ]\n}\n```\n\
        \n**Invalid example** ('id' missing for update)\n```json\n{\n  \"examples\"\
        : [\n    {\n      \"input\": \"Hello\"\n    }\n  ]\n}\n```\n\n<Note>This endpoint\
        \ is in beta, read more [here](https://arize.com/docs/ax/rest-reference#api-version-stages).</Note>\n"
      parameters:
      - $ref: '#/components/parameters/DatasetIdPathParam'
      - $ref: '#/components/parameters/DatasetVersionIdQueryParam'
