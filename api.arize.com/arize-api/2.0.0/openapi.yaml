        attempt to parse or construct it.

        '
      schema:
        type: string
    NameSearchQueryParam:
      name: name
      in: query
      description: 'Case-insensitive substring filter on the resource name. Returns
        only

        resources whose name contains the given string. For example,

        `name=prod` matches "production", "my-prod-dataset", etc. If omitted,

        no name filtering is applied and all resources are returned.

        '
      schema:
        type: string
        maxLength: 255
    SpaceNameQueryParam:
      name: space_name
      in: query
      description: 'Case-insensitive substring filter on the space name. Narrows results

        to resources in spaces whose name contains the given string. If omitted,

        no space name filtering is applied and all resources are returned.

        '
      schema:
        type: string
        maxLength: 255
    ProjectIdQueryParam:
      name: project_id
      in: query
      description: Filter to tasks for a specific project (base64 global ID)
      schema:
        $ref: '#/components/schemas/Id'
    tasks_DatasetIdQueryParam:
      name: dataset_id
      in: query
      description: Filter to tasks for a specific dataset (base64 global ID)
      schema:
        $ref: '#/components/schemas/Id'
  requestBodies:
    CreateAiIntegrationRequestBody:
      description: Body containing AI integration creation parameters
      required: true
      content:
        application/json:
          schema:
            required:
            - name
            - provider
            type: object
            properties:
              name:
                type: string
                description: Integration name
              provider:
                $ref: '#/components/schemas/AiIntegrationProvider'
              api_key:
                type: string
                description: API key for the provider (write-only, never returned)
              base_url:
                type: string
                description: Custom base URL for the provider
              model_names:
                type: array
                items:
                  type: string
                description: Supported model names
              headers:
                type: object
                additionalProperties:
                  type: string
                description: Custom headers to include in requests
              enable_default_models:
                type: boolean
                description: Enable provider's default model list (default false)
              function_calling_enabled:
                type: boolean
                description: Enable function/tool calling (default true)
              auth_type:
                $ref: '#/components/schemas/AiIntegrationAuthType'
              provider_metadata:
                type: object
                additionalProperties: true
                description: Provider-specific configuration (AWS or GCP metadata)
              scopings:
                type: array
                items:
                  $ref: '#/components/schemas/AiIntegrationScoping'
                description: Visibility scoping rules. Defaults to account-wide.
          example:
            name: Production OpenAI
            provider: openAI
            api_key: sk-abc123...
            model_names:
            - gpt-4
            - gpt-4o
            enable_default_models: true
            scopings:
            - organization_id: QWNjb3VudE9yZzoxMjM6YWJj
              space_id: null
    UpdateAiIntegrationRequestBody:
      description: Body containing AI integration update parameters. At least one
        field must be provided.
      required: true
      content:
        application/json:
          schema:
            type: object
            minProperties: 1
            properties:
              name:
                type: string
                description: New integration name
              provider:
                $ref: '#/components/schemas/AiIntegrationProvider'
              api_key:
                type: string
                nullable: true
                description: New API key. Pass null to remove the existing key. Omit
                  to keep unchanged.
              base_url:
                type: string
                nullable: true
                description: Custom base URL. Pass null to remove.
              model_names:
                type: array
                items:
                  type: string
                description: Supported model names (replaces all)
              headers:
                type: object
                nullable: true
                additionalProperties:
                  type: string
                description: Custom headers. Pass null to remove.
              enable_default_models:
                type: boolean
                description: Enable provider's default model list
              function_calling_enabled:
                type: boolean
                description: Enable function/tool calling
              auth_type:
                $ref: '#/components/schemas/AiIntegrationAuthType'
              provider_metadata:
                type: object
                nullable: true
                additionalProperties: true
                description: Provider-specific configuration
              scopings:
                type: array
                items:
                  $ref: '#/components/schemas/AiIntegrationScoping'
                description: Visibility scoping rules (replaces all existing scopings)
            additionalProperties: false
          example:
            name: Updated OpenAI Integration
            api_key: null
            model_names:
            - gpt-4o
            - gpt-4o-mini
    RefreshApiKeyRequestBody:
      description: Optional body for overriding expiry on a refreshed API key.
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiKeyRefresh'
          examples:
            no_expiry:
              summary: No expiry — infinite lifetime (empty body)
              value: {}
            override_expiry:
              summary: Set a new expiry for the refreshed key
              value:
                expires_at: '2027-01-01T00:00:00Z'
    CreateApiKeyRequestBody:
      description: Body containing API key creation parameters
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiKeyCreate'
          examples:
            user_key_minimal:
              summary: User key (minimal)
              value:
                name: CI pipeline key
            user_key_with_expiry:
              summary: User key with expiry
              value:
                name: CI pipeline key
                description: Expires after one year.
                key_type: user
                expires_at: '2026-01-01T00:00:00Z'
            service_key_all_defaults:
              summary: Service key — all roles default to minimum privilege
              value:
                name: Ingestion bot
                key_type: service
                space_id: U3BhY2UxMjM
            service_key_explicit_roles:
              summary: Service key — explicit roles
              value:
                name: Ingestion bot
                key_type: service
                space_id: U3BhY2UxMjM
                roles:
                  space_role: member
                  org_role: read-only
                  account_role: member
    CreateRoleRequestBody:
      description: Body containing role creation parameters.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RoleCreate'
          examples:
            minimal:
              summary: Role with required fields only
              value:
                name: Data Scientist
                permissions:
                - PROJECT_READ
                - DATASET_READ
                - DATASET_CREATE
            with_description:
              summary: Role with description
              value:
                name: Data Scientist
                description: Can read and create datasets and experiments but cannot
                  manage spaces.
                permissions:
                - PROJECT_READ
                - DATASET_READ
                - DATASET_CREATE
                - EXPERIMENT_READ
                - EXPERIMENT_CREATE
    UpdateRoleRequestBody:
      description: Body containing role update parameters. At least one field must
        be provided.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RoleUpdate'
          examples:
            update_name:
              summary: Update role name only
              value:
                name: Senior Data Scientist
            update_permissions:
              summary: Replace permissions
              value:
                permissions:
                - PROJECT_READ
                - DATASET_READ
                - DATASET_CREATE
                - DATASET_DELETE
    UpdateAnnotationQueueRequestBody:
      description: Body containing annotation queue update parameters. At least one
        field must be provided.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateAnnotationQueueRequestBody'
          example:
            name: Updated Queue Name
            instructions: Review each response for accuracy and helpfulness
            annotation_config_ids:
            - ac_abc123
            annotator_emails:
            - reviewer@example.com
    CreateAnnotationQueueRequestBody:
      description: Body containing annotation queue creation parameters
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateAnnotationQueueRequestBody'
          example:
            name: Quality Review Queue
            space_id: spc_xyz789
            annotation_config_ids:
            - ac_abc123
            annotator_emails:
            - annotator1@example.com
            assignment_method: all
    DeleteAnnotationQueueRecordsRequestBody:
      description: Body containing the IDs of annotation queue records to delete
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeleteAnnotationQueueRecordsRequestBody'
          example:
            record_ids:
            - aqr_abc123
            - aqr_def456
    AddAnnotationQueueRecordsRequestBody:
      description: Body containing records to add to an annotation queue
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AddAnnotationQueueRecordsRequestBody'
          example:
            record_sources:
            - record_type: span
              project_id: proj_abc123
              start_time: '2024-01-15T00:00:00Z'
              end_time: '2024-01-15T23:59:59Z'
              span_ids:
              - span_abc123
              - span_def456
    CreateAnnotationConfigRequestBody:
      description: Body containing annotation config creation parameters
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateAnnotationConfigRequestBody'
          example:
            name: Accuracy
            space_id: space_12345
            annotation_config_type: categorical
            values:
            - label: accurate
              score: 1
            - label: inaccurate
              score: 0
            optimization_direction: maximize
    CreateProjectRequestBody:
      description: Body containing project creation parameters
      required: true
      content:
        application/json:
          schema:
            required:
            - name
            - space_id
            type: object
            properties:
              name:
                type: string
                description: Name of the project (must be unique within the space)
              space_id:
                type: string
                description: ID of the space to create the project in
          example:
            name: My Project
            space_id: space_12345
    CreatePromptRequestBody:
      description: Body containing prompt creation parameters with an initial version
      required: true
      content:
        application/json:
          schema:
            required:
            - space_id
            - name
            - version
            type: object
            properties:
              space_id:
                type: string
                description: ID of the space to create the prompt in
              name:
                type: string
                description: Name of the prompt (must be unique within the space)
              description:
                type: string
                description: Description of the prompt. Optional. If omitted, the
                  prompt has no description.
              version:
                $ref: '#/components/schemas/PromptVersionCreateRequest'
          example:
            space_id: U3BhY2U6MTIzOmFiY2Q=
            name: My Prompt
            description: A helpful assistant prompt
            version:
              commit_message: Initial version
              input_variable_format: f_string
              provider: openAI
              model: gpt-4
              messages:
              - role: system
                content: You are a helpful assistant.
              - role: user
                content: Hello, {name}!
    UpdatePromptRequestBody:
      description: Body containing prompt update parameters. At least one field must
        be provided.
      required: true
      content:
        application/json:
          schema:
            type: object
            minProperties: 1
            properties:
              description:
                type: string
                nullable: true
                description: Updated description for the prompt
            additionalProperties: false
          example:
            description: Updated prompt description
    CreatePromptVersionRequestBody:
      description: Body containing prompt version creation parameters
      required: true
      content:
        application/json:
          schema:
            required:
            - commit_message
            - input_variable_format
            - provider
            - messages
            type: object
            properties:
              commit_message:
                type: string
                description: Commit message describing this version
              input_variable_format:
                $ref: '#/components/schemas/InputVariableFormat'
              provider:
                $ref: '#/components/schemas/LlmProvider'
              model:
                type: string
                description: The model to use for the call. Optional. If omitted,
                  no default model is set on the version.
              messages:
                type: array
                minItems: 1
                description: The messages that make up the prompt template
                items:
                  $ref: '#/components/schemas/LLMMessage'
              invocation_params:
                $ref: '#/components/schemas/InvocationParams'
                description: Parameters for the LLM invocation. Optional. Defaults
                  to empty (no invocation parameters).
              provider_params:
                $ref: '#/components/schemas/ProviderParams'
                description: Provider-specific parameters. Optional. Defaults to empty
                  (no provider-specific parameters).
          example:
            commit_message: Updated system prompt for better responses
            input_variable_format: f_string
            provider: openAI
            model: gpt-4
            messages:
            - role: system
              content: You are a helpful assistant.
            - role: user
              content: Hello, {name}!
    SetPromptVersionLabelsRequestBody:
      description: Body containing the labels to set on a prompt version
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - labels
            properties:
              labels:
                type: array
                items:
                  type: string
                minItems: 1
                description: Array of label names to set on the version (replaces
                  all existing labels)
            additionalProperties: false
          example:
            labels:
            - production
            - staging
    CreateEvaluatorRequestBody:
      description: Body containing evaluator creation parameters with an initial version
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - space_id
            - name
            - type
            - version
            properties:
              space_id:
                type: string
                description: Space global ID (base64)
              name:
                type: string
                description: Evaluator name (must be unique within the space)
              description:
                type: string
                description: Evaluator description
              type:
                type: string
                enum:
                - template
                - code
                description: Evaluator type. Only template is supported in this iteration.
              version:
                description: The initial version for the evaluator
                type: object
                required:
                - commit_message
                - template_config
                properties:
                  commit_message:
                    type: string
                    description: Commit message for the initial version
                  template_config:
                    $ref: '#/components/schemas/TemplateConfig'
                    description: The template configuration for the initial version
                additionalProperties: false
            additionalProperties: false
          example:
            space_id: U3BhY2U6NDkzOkJaSkc=
            name: Hallucination Eval
            description: Detects hallucinated content in LLM responses
            type: template
            version:
              commit_message: Initial version
              template_config:
                name: hallucination
                template: 'You are an evaluation assistant. Given the following input
                  and output, determine if the output contains hallucinated content.


                  Input: {{input}}

                  Output: {{output}}

                  Reference: {{reference}}'
                include_explanations: true
                use_function_calling_if_available: true
                classification_choices:
                  hallucinated: 0
                  factual: 1
                direction: maximize
                data_granularity: span
                llm_config:
                  ai_integration_id: TGxtSW50ZWdyYXRpb246MTI6YUJjRA==
                  model_name: gpt-4o
                  invocation_parameters:
                    temperature: 0
                  provider_parameters: {}
    UpdateEvaluatorRequestBody:
      description: Body containing evaluator update parameters
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: New evaluator name
              description:
                type: string
                nullable: true
                description: New description
            additionalProperties: false
          example:
            name: Updated Evaluator Name
            description: Updated description
    CreateEvaluatorVersionRequestBody:
      description: Body containing evaluator version creation parameters
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - commit_message
            - template_config
            properties:
              commit_message:
                type: string
                description: Commit message describing the changes
              template_config:
                $ref: '#/components/schemas/TemplateConfig'
                description: The template configuration for this version
            additionalProperties: false
          example:
            commit_message: Improve template wording
            template_config:
              name: hallucination
              template: 'Evaluate whether the output is factually grounded.


                Input: {{input}}

                Output: {{output}}'
              include_explanations: true
              use_function_calling_if_available: true
              classification_choices:
                hallucinated: 0
                factual: 1
              direction: maximize
              data_granularity: span
              llm_config:
                ai_integration_id: TGxtSW50ZWdyYXRpb246MTI6YUJjRA==
                model_name: gpt-4o
                invocation_parameters:
                  temperature: 0
                provider_parameters: {}
    CreateDatasetRequestBody:
      description: Body containing dataset creation parameters
      required: true
      content:
        application/json:
          schema:
            required:
            - name
            - space_id
            - examples
            type: object
            properties:
              name:
                type: string
                description: Name of the new dataset
              space_id:
                type: string
                description: ID of the space the dataset will belong to
              examples:
                type: array
                description: Array of examples for the new dataset
                items:
                  $ref: '#/components/schemas/DatasetExampleCreate'
          example:
            name: Math Questions Dataset
            space_id: space_12345
            examples:
            - question: What is 2 + 2?
              answer: '4'
              topic: arithmetic
            - question: What is the square root of 16?
              answer: '4'
              topic: geometry
            - question: If 3x = 12, what is x?
              answer: '4'
              topic: algebra
    InsertDatasetExamplesRequestBody:
      description: Body containing dataset examples for insert (append) operation
        with auto-generated IDs
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              examples:
                type: array
                description: Array of examples to append to the dataset version
                items:
                  $ref: '#/components/schemas/DatasetExampleCreate'
            required:
            - examples
            additionalProperties: false
          example:
            examples:
            - question: What is 2 + 2?
              answer: '4'
              topic: arithmetic
            - question: What is the square root of 16?
              answer: '4'
              topic: geometry
            - question: If 3x = 12, what is x?
              answer: '4'
              topic: algebra
    UpdateDatasetExamplesRequestBody:
      description: Body containing dataset examples for update operation by ID matching
      required: true
      content:
        application/json:
          schema:
            required:
            - examples
            type: object
            properties:
              examples:
                type: array
                description: Array of examples with 'id' field for matching and updating
                  existing records
                items:
                  $ref: '#/components/schemas/DatasetExampleUpdate'
              new_version:
                type: string
                description: 'Name for the new version. If provided (non-empty), creates
                  a

                  new version with that name.


                  If omitted or empty, updates the existing version in-place.

                  '
          example:
            examples:
            - id: example_001
              question: What is 2 * 2?
            - id: example_002
              question: What is the square root of 64?
              answer: '8'
            - id: example_003
              question: If 9x = 36, what is x?
              topic: algebra
    CreateExperimentRequestBody:
      description: Body containing experiment creation parameters
      required: true
      content:
        application/json:
          schema:
            required:
            - name
            - dataset_id
            - experiment_runs
            type: object
            properties:
              name:
                type: string
                description: Name of the experiment
              dataset_id:
                type: string
                description: ID of the dataset to create the experiment for
              experiment_runs:
                type: array
                description: Array of experiment run data
                items:
                  $ref: '#/components/schemas/ExperimentRunCreate'
          example:
            name: My Experiment Name
            dataset_id: dataset_12345
            experiment_runs:
            - example_id: example_001
              output: '4'
              model: gpt-4o-mini
              temperature: 0.2
              latency_ms: 118
              prompt: Answer the math question briefly.
            - example_id: example_002
              output: '4'
              model: gpt-4o-mini
              temperature: 0.2
              latency_ms: 132
            - example_id: example_003
              output: '4'
              model: gpt-4o-mini
              temperature: 0.2
              latency_ms: 125
    CreateSpaceRequestBody:
      description: Body containing space creation parameters
      required: true
      content:
        application/json:
          schema:
            required:
            - name
            - organization_id
            type: object
            properties:
              name:
                type: string
                maxLength: 255
                description: Name of the space (must be unique within the organization)
              organization_id:
                type: string
                description: ID of the organization to create the space in
              description:
                type: string
                maxLength: 1000
                description: A brief description of the space's purpose. Defaults
                  to an empty string if omitted.
            additionalProperties: false
          example:
            name: LLM Evaluation
            organization_id: org_12345
            description: Space for evaluating LLM performance
    UpdateSpaceRequestBody:
      description: Body containing space update parameters. At least one field must
        be provided.
      required: true
      content:
        application/json:
          schema:
            type: object
            minProperties: 1
            properties:
              name:
                type: string
                maxLength: 255
                description: Updated name for the space (must be unique within the
                  organization)
              description:
                type: string
                maxLength: 1000
                description: Updated description for the space. Set to an empty string
                  to clear it.
            additionalProperties: false
          example:
            name: Updated Space Name
            description: Updated space description
    CreateTaskRequestBody:
      description: Body containing task creation parameters
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - name
            - type
            - evaluators
            properties:
              name:
                type: string
                description: Task name
              type:
                type: string
                enum:
                - template_evaluation
                - code_evaluation
                description: Task type
              project_id:
                type: string
                description: Project global ID (base64). Required if dataset_id is
                  not provided. Mutually exclusive with dataset_id.
              dataset_id:
                type: string
                description: Dataset global ID (base64). Required if project_id is
                  not provided. Mutually exclusive with project_id.
              experiment_ids:
                type: array
                items:
                  type: string
                description: Experiment global IDs (base64). Required when dataset_id
                  is provided (at least one). Must be omitted or empty for project-based
                  tasks.
              sampling_rate:
                type: number
                minimum: 0
                maximum: 1
                description: Sampling rate between 0 and 1. Only supported on project
                  tasks.
              is_continuous:
                type: boolean
                description: Whether the task runs continuously. Must be true or false
                  for project-based tasks. Must be false or omitted for dataset-based
                  tasks.
              query_filter:
                type: string
                description: Task-level query filter applied to all data.
              evaluators:
                type: array
                minItems: 1
                items:
                  type: object
                  required:
                  - evaluator_id
                  properties:
                    evaluator_id:
                      type: string
                      description: Evaluator global ID (base64). Duplicates are not
                        allowed.
                    query_filter:
                      type: string
                      description: Per-evaluator query filter. Combined with the task-level
                        filter (AND).
                    column_mappings:
                      type: object
                      additionalProperties:
                        type: string
                      description: Maps evaluator template variable names to data
                        source column names.
                  additionalProperties: false
                description: Evaluators to attach (at least one required).
            additionalProperties: false
          example:
            name: Production Hallucination Check
            type: template_evaluation
            project_id: TW9kZWw6MTIzOmFCY0Q=
            sampling_rate: 1
            is_continuous: true
            query_filter: metadata.environment = 'production'
            evaluators:
            - evaluator_id: RXZhbHVhdG9yOjEyOmFCY0Q=
              column_mappings:
                input: attributes.input.value
                output: attributes.output.value
    TriggerTaskRunRequestBody:
      description: Body containing task run trigger parameters
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              data_start_time:
                type: string
                format: date-time
                description: ISO 8601 start of the data window to evaluate.
              data_end_time:
                type: string
                format: date-time
                description: ISO 8601 end of the data window to evaluate. If omitted,
                  defaults to now.
              max_spans:
                type: integer
                minimum: 1
                description: Maximum number of spans to process (default 10000).
              override_evaluations:
                type: boolean
                description: Whether to re-evaluate data that already has evaluation
                  labels (default false).
              experiment_ids:
                type: array
                items:
                  type: string
                description: Experiment global IDs (base64) to run against. Only applicable
                  for dataset-based tasks.
            additionalProperties: false
          example:
            data_start_time: '2026-03-01T00:00:00Z'
            data_end_time: '2026-03-07T00:00:00Z'
            max_spans: 5000
            override_evaluations: false
    ListSpansRequestBody:
      description: Body containing span query parameters
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - project_id
            properties:
              project_id:
                type: string
                description: The project ID to list spans for
              start_time:
                type: string
                format: date-time
                description: 'Filter to spans starting at or after this timestamp
                  (inclusive).

                  ISO 8601 format (e.g., `2024-01-01T00:00:00Z`). Defaults to 1 week
                  ago.

                  '
              end_time:
                type: string
                format: date-time
                description: 'Filter to spans starting before this timestamp (exclusive).

                  ISO 8601 format (e.g., `2024-01-02T00:00:00Z`). Defaults to the
                  current time.

                  '
              filter:
                type: string
                description: 'Filter expression to apply to the query. Supports SQL-like
                  syntax

                  for filtering spans by attributes (e.g., `status_code = ''ERROR''`).

                  '
            additionalProperties: false
          example:
            project_id: my-project
            start_time: '2024-01-01T00:00:00Z'
            end_time: '2024-01-02T00:00:00Z'
