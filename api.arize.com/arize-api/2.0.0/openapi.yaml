          description: 'Map of choice label to numeric score (e.g. {"relevant": 1,
            "irrelevant": 0}). When omitted, the evaluator produces freeform (non-classification)
            output.'
        direction:
          type: string
          nullable: true
          enum:
          - maximize
          - minimize
          description: Optimization direction for annotation scores. When omitted,
            no optimization preference is set.
        data_granularity:
          type: string
          nullable: true
          enum:
          - span
          - trace
          - session
          description: Data granularity level. Defaults to null when omitted.
        llm_config:
          $ref: '#/components/schemas/EvaluatorLlmConfig'
          description: The LLM configuration for executing the template
      additionalProperties: false
    EvaluatorLlmConfig:
      type: object
