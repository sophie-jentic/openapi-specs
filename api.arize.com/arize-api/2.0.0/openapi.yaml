        \ Each example must contain at least one property (i.e., `{}` is invalid).\n\
        \n**Valid example** (create)\n```json\n{\n  \"examples\": [\n    { \"question\"\
        : \"What is 2+2?\",\n      \"answer\": \"4\",\n      \"topic\": \"math\"\n\
        \    }\n  ]\n}\n```\n\n**Invalid example** ('id' not allowed on create)\n\
        ```json\n{\n  \"examples\": [\n    {\n      \"id\": \"ex_1\",\n      \"input\"\
