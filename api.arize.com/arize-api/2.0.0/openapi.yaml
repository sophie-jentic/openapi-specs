      description: "Appends new examples to an existing dataset.\n\nIf the dataset\
        \ version is not passed, the latest version is selected.\nThe inserted examples\
        \ will be assigned autogenerated, unique IDs.\n\n**Payload Requirements**\n\
        - Each item in `examples[]` may contain any user-defined fields.\n- Do not\
