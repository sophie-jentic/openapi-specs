      - name
      - description
      - created_at
      properties:
        id:
          type: string
          description: Unique identifier for the space
        name:
          type: string
          description: Name of the space
        description:
          type: string
          description: A brief description of the space's purpose
        created_at:
          type: string
          format: date-time
          description: Timestamp for when the space was created
      description: 'A space is a container within an organization for grouping related
        projects,

        datasets, and experiments. Spaces enable team collaboration or isolated

        experimentation with role-based access control.

        '
      additionalProperties: false
    Dataset:
      required:
      - id
      - name
      - space_id
      - created_at
      - updated_at
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the dataset
        name:
          type: string
          description: Name of the dataset
        space_id:
          type: string
          description: Unique identifier for the space this dataset belongs to
        created_at:
          type: string
          description: Timestamp for when the dataset was created
          format: date-time
        updated_at:
          type: string
          description: Timestamp for the last update of the dataset
          format: date-time
        versions:
          type: array
          items:
            $ref: '#/components/schemas/DatasetVersion'
          description: List of versions associated with this dataset
      description: 'A dataset is a structured collection of examples used to test
        and evaluate

        LLM applications. Datasets allow you to test models consistently across

        any real-world scenarios and edge cases, quickly identify regressions,

        and track measurable improvements.

        '
      additionalProperties: false
    DatasetVersion:
      required:
      - id
      - name
      - dataset_id
      - created_at
      - updated_at
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the dataset version
        name:
          type: string
          description: Name of the dataset version
        dataset_id:
          type: string
          description: Unique identifier for the dataset this version belongs to
        created_at:
          type: string
          description: Timestamp for when the dataset version was created
          format: date-time
        updated_at:
          type: string
          description: Timestamp for the last update of the dataset version
          format: date-time
      description: 'A dataset version is a saved snapshot of a dataset. Arize stores
        datasets

        as version-controlled collections of examples for experiments.

        When you update a dataset, you can do so inplace  or create a new version

        while preserving access to previous versions.

        '
      additionalProperties: false
    Experiment:
      required:
      - id
      - name
      - dataset_id
      - dataset_version_id
      - created_at
      - updated_at
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the experiment
        name:
          type: string
          description: Name of the experiment
        dataset_id:
          type: string
          description: Unique identifier for the dataset this experiment belongs to
        dataset_version_id:
          type: string
          description: Unique identifier for the dataset version this experiment belongs
