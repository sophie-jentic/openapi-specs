      summary: Create an API key
      description: "Create a new API key for the authenticated user.\n\n- `key_type`\
        \ defaults to `user` when omitted.\n- For `service` keys, `space_id` is required.\
        \ The service key is\n  scoped to the given space, and a bot user will be\
        \ created with the specified roles.\n- For `user` keys, `space_id` and `roles`\
        \ must not be set — passing either returns `400`.\n  The key inherits the\
        \ authenticated user's own permissions.\n- You may only assign roles at or\
        \ below your own privilege level. Attempting to\n  assign a role higher than\
        \ your own returns `400 Bad Request`.\n- All roles default to the minimum\
        \ privilege when omitted: `space_role` → `member`,\n  `org_role` → `read-only`,\
        \ `account_role` → `member`.\n\nThe full API key value (`key`) is **only returned\
        \ once** in the creation response.\nStore it securely — it cannot be retrieved\
        \ again. Use the `redacted_key` field on\nsubsequent reads.\n\n<Warning>This\
