openapi: 3.1.1
info:
  title: blocky API
  description: "# Blocky\nBlocky is a DNS proxy and ad-blocker for the local network\
    \ written in Go with following features:\n## Features\n- **Blocking** - Blocking\
    \ of DNS queries with external lists (Ad-block, malware) and allowlisting\n\n\
    \  - Definition of allow/denylists per client group (Kids, Smart home devices,\
    \ etc.)\n  - Periodical reload of external allow/denylists\n  - Regex support\n\
    \  - Blocking of request domain, response CNAME (deep CNAME inspection) and response\
    \ IP addresses (against IP lists)\n\n- **Advanced DNS configuration** - not just\
    \ an ad-blocker\n\n  - Custom DNS resolution for certain domain names\n  - Conditional\
    \ forwarding to external DNS server\n  - Upstream resolvers can be defined per\
    \ client group\n\n- **Performance** - Improves speed and performance in your network\n\
    \n  - Customizable caching of DNS answers for queries -> improves DNS resolution\
    \ speed and reduces amount of external DNS\n    queries\n  - Prefetching and caching\
    \ of often used queries\n  - Using multiple external resolver simultaneously\n\
    \  - Low memory footprint\n\n- **Various Protocols** - Supports modern DNS protocols\n\
    \n  - DNS over UDP and TCP\n  - DNS over HTTPS (aka DoH)\n  - DNS over TLS (aka\
    \ DoT)\n\n- **Security and Privacy** - Secure communication\n\n  - Supports modern\
    \ DNS extensions: DNSSEC, eDNS, ...\n  - Free configurable blocking lists - no\
    \ hidden filtering etc.\n  - Provides DoH Endpoint\n  - Uses random upstream resolvers\
    \ from the configuration - increases your privacy through the distribution of\
    \ your DNS\n    traffic over multiple provider\n  - Blocky does **NOT** collect\
    \ any user data, telemetry, statistics etc.\n\n- **Integration** - various integration\n\
    \n  - [Prometheus](https://prometheus.io/) metrics\n  - Prepared [Grafana](https://grafana.com/)\
    \ dashboards (Prometheus and database)\n  - Logging of DNS queries per day / per\
    \ client in CSV format or MySQL/MariaDB/PostgreSQL/Timescale database - easy to\n\
    \    analyze\n  - Various REST API endpoints\n  - CLI tool\n\n- **Simple configuration**\
    \ - single or multiple configuration files in YAML format\n\n  - Simple to maintain\n\
    \  - Simple to backup\n\n- **Simple installation/configuration** - blocky was\
    \ designed for simple installation\n\n  - Stateless (no database, no temporary\
    \ files)\n  - Docker image with Multi-arch support\n  - Single binary\n  - Supports\
    \ x86-64 and ARM architectures -> runs fine on Raspberry PI\n  - Community supported\
    \ Helm chart for k8s deployment\n\n## Quick start\nYou can jump to [Installation](https://0xerr0r.github.io/blocky/installation/)\
    \ chapter in the documentation.\n## Full documentation\nYou can find full documentation\
    \ and configuration examples at: [https://0xERR0R.github.io/blocky/](https://0xERR0R.github.io/blocky/)"
  contact:
    name: blocky@github
    url: https://github.com/0xERR0R/blocky
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: '1.0'
servers:
- url: /api
paths:
  /blocking/disable:
    get:
      operationId: disableBlocking
      tags:
      - blocking
      summary: Disable blocking
      description: disable the blocking status
      parameters:
      - name: duration
        in: query
        description: 'duration of blocking (Example: 300s, 5m, 1h, 5m30s)'
        schema:
          type: string
      - name: groups
        in: query
        description: groups to disable (comma separated). If empty, disable all groups
        schema:
          type: string
      responses:
        '200':
          description: Blocking is disabled
        '400':
          description: Bad request (e.g. unknown group)
          content:
            text/plain:
              schema:
                type: string
                example: Bad request
  /blocking/enable:
    get:
      operationId: enableBlocking
      tags:
      - blocking
      summary: Enable blocking
      description: enable the blocking status
      responses:
        '200':
          description: Blocking is enabled
  /blocking/status:
    get:
      operationId: blockingStatus
      tags:
      - blocking
      summary: Blocking status
      description: get current blocking status
      responses:
        '200':
          description: Returns current blocking status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.BlockingStatus'
  /lists/refresh:
    post:
      operationId: listRefresh
      tags:
      - lists
      summary: List refresh
      description: Refresh all lists
      responses:
        '200':
          description: Lists were reloaded
        '500':
          description: List refresh error
          content:
            text/plain:
              schema:
                type: string
                example: Error text
  /query:
    post:
      operationId: query
      tags:
      - query
      summary: Performs DNS query
      description: Performs DNS query
      requestBody:
        description: query data
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api.QueryRequest'
        required: true
      responses:
        '200':
          description: query was executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.QueryResult'
        '400':
          description: Wrong request format
          content:
            text/plain:
              schema:
                type: string
                example: Bad request
  /cache/flush:
    post:
      operationId: cacheFlush
      tags:
      - cache
      summary: Clears the DNS response cache
      description: Removes all DNS responses from cache
      responses:
        '200':
          description: All caches cleared
components:
  schemas:
    api.BlockingStatus:
      type: object
      properties:
        autoEnableInSec:
          type: integer
          minimum: 0
          description: 'If blocking is temporary disabled: amount of seconds until
            blocking will be enabled'
        disabledGroups:
          type: array
          description: Disabled group names
          items:
            type: string
        enabled:
          type: boolean
          description: True if blocking is enabled
      required:
      - enabled
    api.QueryRequest:
      type: object
      properties:
        query:
          type: string
          description: query for DNS request
        type:
          type: string
          description: request type (A, AAAA, ...)
      required:
      - query
      - type
    api.QueryResult:
      type: object
      properties:
        reason:
          type: string
          description: blocky reason for resolution
        response:
          type: string
          description: actual DNS response
        responseType:
          type: string
          description: response type (CACHED, BLOCKED, ...)
        returnCode:
          type: string
          description: DNS return code (NOERROR, NXDOMAIN, ...)
      required:
      - reason
      - response
      - responseType
      - returnCode
tags:
- name: blocking
- name: cache
- name: lists
- name: query
