      type: object
      description: Create a new user.
      required:
      - firstName
      - lastName
      - username
      - dateTimePreferences
      - enabled
      - apiOnly
      properties:
        firstName:
          type: string
        lastName:
          type: string
        username:
          $ref: '#/components/schemas/username'
        dateTimePreferences:
          type: object
          properties:
            dateFormat:
              type: string
            timeFormat:
              type: string
            timeZone:
              type: string
        enabled:
          description: Whether the user is enabled or not.
          type: boolean
        apiOnly:
          description: Sets the user to API Only. API Only users can access Contrast's
            REST API but cannot log in to Contrast's web interface.
          type: boolean
        userAccessGroupMembership:
          type: array
          description: The IDs for user access groups to add this user to.
          items:
            $ref: '#/components/schemas/userAccessGroupMembership'
        role:
          description: 'The EAC organization role assigned to the user. When RBAC
            is not enforced, permissions for this user are

            based on this role. When RBAC is enforced, this role is ignored.

            '
          type: string
          enum:
          - view
          - edit
          - rules_admin
          - admin
    UpdateUserRequest:
      type: object
      description: A user to be updated in the system
      required:
      - firstName
      - lastName
      - dateTimePreferences
      - enabled
      - apiOnly
      properties:
        firstName:
          type: string
        lastName:
          type: string
        dateTimePreferences:
          type: object
          properties:
            dateFormat:
              type: string
            timeFormat:
              type: string
            timeZone:
              type: string
        enabled:
          description: Whether the user is enabled or not.
          type: boolean
        apiOnly:
          description: Sets the user to API Only. API Only users can access Contrast's
            REST API but cannot log in to Contrast's web interface.
          type: boolean
        userAccessGroupMembership:
          type: array
          description: "Specifies the IDs of the user access groups to which the user\
            \ should be a part of.\nOmitting this field or sending a NULL value will\
            \ have no effect on the user's access group memberships. \nIf included\
            \ with an empty list, the user will be removed from all user access groups\
            \ in which they are enrolled.\n"
          items:
            $ref: '#/components/schemas/userAccessGroupMembership'
        role:
          description: 'The EAC organization role assigned to the user. When RBAC
            is not enforced, permissions for this user are

