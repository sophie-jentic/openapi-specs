      operationId: removeUserFromGroupByUsername
      summary: Remove user from user access group
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: userAccessGroupId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userAccessGroupId'
      - name: username
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/username'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccessGroupResponse'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: If the group or the user do not already exist in the system.
