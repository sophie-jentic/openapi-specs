          $ref: '#/components/schemas/userId'
      - name: pageable
        in: query
        schema:
          $ref: '#/components/schemas/Pageable'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccessGroupPageResponse'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: If the user does not exist in the system.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /api/v4/organizations/{organizationId}/user-access-groups/{userAccessGroupId}/users/{userId}:
    put:
      description: Adds a user to a user access group.
      tags:
      - Membership
      operationId: addUserToGroup
      summary: Add user to user access group
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: userAccessGroupId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userAccessGroupId'
      - name: userId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userId'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccessGroupResponse'
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: If the group or the user do not already exist in the system.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        409:
          description: If the association already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    delete:
      description: Remove a user from a user access group.
      tags:
      - Membership
      operationId: removeUserFromGroup
      summary: Remove user from user access group
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: userAccessGroupId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userAccessGroupId'
      - name: userId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userId'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccessGroupResponse'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: If the group or the user do not already exist in the system.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /api/v4/organizations/{organizationId}/users/{username}/user-access-groups:
    get:
      description: Retrieves the user access groups where a user belongs.
      tags:
      - Membership
      operationId: getUserAccessGroupsForUserByUniqueId
      summary: Find user access group membership
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: username
        in: path
        required: true
