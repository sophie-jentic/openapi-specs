openapi: 3.0.1
info:
  title: Contrast Access Control API
  description: Contrast access control APIs for managing role-based access control.
    See <a href='https://docs.contrastsecurity.com/en/access-control.html' target=_blank>Contrast
    Documentation</a> for more information. These APIs are available for hosted customers
    only.
  version: v20240613
  x-logo:
    url: /logo.svg
    href: /
  contact:
    name: API Support
servers:
- url: https://{baseUrl}
  variables:
    baseUrl:
      default: app.contrastsecurity.com
      description: The base URL of your Contrast instance
tags:
- name: Actions
  description: API for finding available actions in the system
- name: Audit Logs
  description: This section has been moved to <a href='/audit/v4#tag/Audit-Logs'>Audit
    &gt; Audit Logs</a>
- name: Authorization
  description: APIs for performing authorization checks
- name: Resource groups
  description: APIs for managing Resource Groups
- name: Resource group resources
  description: Manages the items included in a resource group.
- name: Roles
  description: Manages user roles
- name: User access groups
  description: APIs for managing user access groups
- name: User access group roles
  description: APIs for managing the roles assigned to user access groups
- name: Membership
  description: APIs for managing user members in a user access group
- name: Users
  description: APIs for managing user details
paths:
  /api/v4/organizations/{organizationId}/actions:
    get:
      description: Retrieves the list of actions available for the given organization
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      tags:
      - Actions
      operationId: getActions
      summary: List actions
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
  /api/v4/organizations/{organizationId}/access-control-query/users/{userId}:
    get:
      description: Performs an authorization query to find the list of actions a user
        can perform.
      tags:
      - Authorization
      summary: Find access for a user
      operationId: authorizationQueryUserAccess
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: userId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userId'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationQueryResponse'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: The user does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /api/v4/organizations/{organizationId}/access-control-query/resources/{resourceId}:
    get:
      description: Performs an authorization query that returns the list of actions
        for a given resource.
      tags:
      - Authorization
      operationId: authorizationQueryResourceAccess
      summary: Resource access
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: resourceId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/resourceId'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationQueryResponse'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: The resource does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /api/v4/organizations/{organizationId}/access-control-query/resources/{resourceId}/users/{userId}:
    get:
      description: Performs a check to see what access level a user has on a given
        resource.
      tags:
      - Authorization
      summary: User access for a resource
      operationId: accessControlQueryUserAccessToResource
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: resourceId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/resourceId'
      - name: userId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userId'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationQueryResponse'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: The user or the resource do not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /api/v4/organizations/{organizationId}/user-access-groups:
    get:
      description: Finds user access groups based on provided criteria.
      tags:
      - User access groups
      summary: Find user access groups.
      operationId: findUserAccessGroups
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: pageable
        in: query
        schema:
          $ref: '#/components/schemas/Pageable'
      - name: nameFilter
        in: query
        schema:
          type: string
        description: Search term to filter the user access groups. Searches by name.
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccessGroupPageResponse'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
    post:
      description: Create a new user access group
      tags:
      - User access groups
      summary: Create user access group
      operationId: createUserAccessGroup
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAccessGroupRequest'
        required: true
      responses:
        201:
          description: User access group created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccessGroupResponse'
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        409:
          description: The name is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /api/v4/organizations/{organizationId}/user-access-groups/{userAccessGroupId}:
    get:
      description: Retrieves a user access group by ID.
      tags:
      - User access groups
      operationId: getUserAccessGroup
      summary: Get user access group
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: userAccessGroupId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userAccessGroupId'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccessGroupResponse'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: User access group not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    put:
      description: Updates a user access group.
      tags:
      - User access groups
      operationId: updateUserAccessGroup
      summary: Update user access group
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: userAccessGroupId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userAccessGroupId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAccessGroupRequest'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccessGroupResponse'
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: User access group not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    delete:
      description: Deletes a user access group.
      tags:
      - User access groups
      operationId: deleteUserAccessGroup
      summary: Delete user access group
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: userAccessGroupId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userAccessGroupId'
      responses:
        204:
          $ref: '#/components/responses/nocontent204'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: User access group not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /api/v4/organizations/{organizationId}/roles:
    get:
      description: Find roles in the system that match criteria.
      tags:
      - Roles
      summary: Find roles
      operationId: findRoles
      parameters:
