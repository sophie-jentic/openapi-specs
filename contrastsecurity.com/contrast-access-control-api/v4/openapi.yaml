  /api/v4/organizations/{organizationId}/roles/{roleId}:
    get:
      description: Retrieves a role by ID.
      tags:
      - Roles
      summary: Get role
      operationId: getRole
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: roleId
        in: path
        required: true
        schema:
