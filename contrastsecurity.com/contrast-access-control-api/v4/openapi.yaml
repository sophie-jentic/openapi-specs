      tags:
      - Roles
      summary: Update role
      operationId: updateRole
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: roleId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/roleId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: Role does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        409:
          description: Role name already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    delete:
      description: Deletes a role by its ID.
      tags:
      - Roles
      summary: Delete role
      operationId: deleteRole
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: roleId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        204:
          $ref: '#/components/responses/nocontent204'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        404:
          description: Role does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /api/v4/organizations/{organizationId}/resource-groups:
    get:
      description: Find resource groups in the system for a given organization based
        on search criteria.
      tags:
      - Resource groups
      summary: Find resource groups
      operationId: findResourceGroups
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: pageable
        in: query
        schema:
          $ref: '#/components/schemas/Pageable'
      - name: nameFilter
        in: query
        schema:
          type: string
