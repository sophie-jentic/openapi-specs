components:
  securitySchemes:
    Contrast-API-Key:
      type: apiKey
      in: header
      name: API-Key
    Authorization:
      type: apiKey
      in: header
      name: Authorization
  responses:
    forbidden403:
      description: Forbidden - Missing or invalid authentication details sent in request.
    unauthorized401:
      description: Unauthorized - User is not able to invoke this API.
    nocontent204:
      description: No content
  schemas:
    organizationId:
      description: Organization ID in Contrast web interface. Located under User menu
        > User Settings > Profile.
      type: string
      format: uuid
      example: 119844af-42ff-4293-b06b-81d426e9a4a9
    userId:
      description: Unique User ID in Contrast.
      type: string
      format: uuid
      example: 59112041-c585-4361-a4c9-d43cd6a0911f
    username:
      description: Unique user name in Contrast
      type: string
      format: email
      example: test.user@contrastsecurity.com
    userStatus:
      description: Current user status
      type: string
      enum:
      - ACTIVE
      - LOCKED
      - INACTIVE
      - WAITING_ACTIVATION
    userType:
      description: Type of user
      type: string
      enum:
      - STANDARD
      - AGENT
      - SERVERLESS
    roleId:
      description: Unique role ID in Contrast.
      type: string
      format: uuid
      example: 799af615-420c-47e5-8533-8f3df537048f
    resourceGroupId:
      description: Resource group ID in Contrast.
      type: string
      format: uuid
      example: 4bf783b0-0166-4a65-b5ef-83dc60fe7258
    resourceId:
      description: Application or project ID in Contrast.
      type: string
      format: uuid
      example: 4bf783b0-0166-4a65-b5ef-83dc60fe7258
    resourceType:
      description: "The type of resource. `PROJECT` (for Scan), `APPLICATION` (for\
        \ Assess), `SCA_PROJECT_GROUP` (for SCA), \nEXCLUSIONS & SENSITIVE_DATA (for\
        \ Protect), FUNCTION (for Serverless).\n"
      type: string
      enum:
      - APPLICATION
      - EXCLUSIONS
      - FUNCTION
      - ORGANIZATION
      - PERMISSION
      - PROJECT
      - ORG_SETTINGS
      - RESOURCE_GROUP
      - ROLE
      - SCA_PROJECT_GROUP
      - SENSITIVE_DATA
      - USER
      - USER_ACCESS_GROUP
    userAccessGroupId:
      description: User access group ID in Contrast.
      type: string
      format: uuid
      example: 90b4bc91-c0cb-49d9-a487-f67d35cbf1e6
    userAccessGroupName:
      description: Name of the user access group.
      type: string
      example: DevOps Administration
    action:
      type: string
      enum:
      - ACCESS_NORTHSTAR
      - ACCESS_SERVERLESS
      - ADMIN
      - APPLICATION_ADMIN
      - APPLICATION_EDIT
      - APPLICATION_EDIT_VULNERABILITY_DELETE
      - APPLICATION_EDIT_VULNERABILITY_MANAGE
      - APPLICATION_EDIT_VULNERABILITY_SEVERITY
      - APPLICATION_EDIT_VULNERABILITY_STATUS
      - APPLICATION_ISSUES_CLOSE
      - APPLICATION_RULES_ADMIN
      - APPLICATION_VIEW
      - EDIT
      - INCIDENT_ADMIN
      - INCIDENT_EDIT
      - INCIDENT_VIEW
      - ORG_SETTINGS_PROJECT_CREATE
      - PLATFORM_ORG_MANAGE
      - PROTECT_ACCESS
      - PROTECT_ACCESS_ORG
      - PROTECT_EXCLUSIONS_MANAGE
      - PROTECT_POLICIES_MANAGE
      - PROTECT_SENSITIVE_DATA_POLICY_MANAGE
      - RESOURCE_GROUP_PROJECT_CREATE
      - RULES_ADMIN
      - SAST_PROJECT_DELETE
      - SAST_PROJECT_EDIT
      - SAST_PROJECT_MANAGE
      - SAST_PROJECT_VIEW
      - SAST_SCAN_UPLOAD
      - SCA_PROJECT_GROUP_CREATE
      - SCA_PROJECT_GROUP_DELETE
      - SCA_PROJECT_GROUP_MANAGE
      - SCA_PROJECT_GROUP_VIEW
      - TASKS_MANAGE
      - TASKS_PLATFORM_MANAGE
      - VIEW
      - VIEW_ATTACK_DATA
      - VIEW_AUDIT_LOGS
      example: SAST_PROJECT_VIEW
    userAccessGroupMembership:
      type: object
      properties:
        userAccessGroupId:
          $ref: '#/components/schemas/userAccessGroupId'
        userAccessGroupName:
          $ref: '#/components/schemas/userAccessGroupName'
    ActionResponse:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/action'
    ErrorMessage:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
              description: Message explaining the error that occurred.
              example: Validation error.
            details:
              type: array
              description: Optional list of individual details about the error.
              items:
                type: object
                properties:
                  message:
                    type: string
                    description: Explanation of this detail about the error.
                    example: Field [enabled] must not be null
                  target:
                    type: string
                    description: Optional name of the item this detail is about (if
                      applicable).
                    example: enabled
      required:
      - error
    UserResponse:
      type: object
      properties:
        userId:
          $ref: '#/components/schemas/userId'
        username:
          $ref: '#/components/schemas/username'
        organizationId:
          $ref: '#/components/schemas/organizationId'
        firstName:
          type: string
          description: First name or given name for this user.
        lastName:
          type: string
          description: Last name or family name for this user.
        status:
          $ref: '#/components/schemas/userStatus'
        type:
          $ref: '#/components/schemas/userType'
        dateTimePreferences:
          type: object
          properties:
            dateFormat:
              type: string
            timeFormat:
              type: string
            timeZone:
              type: string
        auditDates:
          type: object
          properties:
            lastLoginTime:
              type: string
              format: date-time
            creationDate:
              type: string
              format: date-time
        userAccessGroupMembership:
          type: array
          description: The IDs for user access groups to add this user to.
          items:
            $ref: '#/components/schemas/userAccessGroupMembership'
    UserAccessGroupRequest:
      required:
      - description
      - name
      type: object
      properties:
        name:
          type: string
          description: The name for this user access group.  Must be unique within
            the organization.
          example: UI Development Team
        description:
          type: string
          description: The description of this user access group.
        userIds:
          description: The users belonging to this user access group.  Must include
            all existing values when updating.
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/userId'
        roleIds:
          description: The role IDs that are assigned to this user access group.  Must
            include all existing values when updating.
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/roleId'
    UserAccessGroupResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/userAccessGroupId'
        organizationId:
          $ref: '#/components/schemas/organizationId'
        name:
          description: The name for this user access group.
          type: string
        description:
          type: string
          description: The description of this user access group.
        builtIn:
          type: boolean
          example: false
          description: When set to true, this UserAccessGroup represents a built-in
            object whose name/description cannot be modified.
        system:
          type: boolean
          example: false
          deprecated: true
          description: This property is deprecated and will be removed in the near
            future. Instead, use the 'builtIn' property.
        userIds:
          uniqueItems: true
          description: The users associated with this user access group.
          type: array
          items:
            $ref: '#/components/schemas/userId'
        roleIds:
          uniqueItems: true
          description: The roles directly associated with this user access group.
          type: array
          items:
