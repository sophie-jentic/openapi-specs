          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolePageResponse'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
    post:
      description: Creates a new role in the system.
      tags:
      - Roles
      summary: Create role.
      operationId: createRole
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
        required: true
      responses:
        201:
          description: Role created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        401:
          $ref: '#/components/responses/unauthorized401'
        403:
          $ref: '#/components/responses/forbidden403'
        409:
          description: The name is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /api/v4/organizations/{organizationId}/user-access-groups/user/{userId}:
    get:
      description: Retrieves the user access groups where a user belongs.
      tags:
      - Membership
      operationId: getUserAccessGroupsForUser
      summary: Find user access group membership
      parameters:
