            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    delete:
      description: Remove a role from a User Access Group.
      tags:
      - User access group roles
      operationId: removeRoleFromGroup
      summary: Remove role from a user access group
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/organizationId'
      - name: userAccessGroupId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/userAccessGroupId'
      - name: roleId
        in: path
