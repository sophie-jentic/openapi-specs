openapi: 3.1.0
info:
  title: Contrast REST API Specification for SAST
  description: OpenAPI specification for the Contrast REST API for SAST. This API
    serves as the most important interface to our application and is meant to serve
    any developer
  contact:
    name: Contrast Customer Support
    url: https://www.contrastsecurity.com/customer-support
    email: support@contrastsecurity.com
  version: '1.0'
  x-logo:
    url: /logo.svg
    href: /
servers:
- url: https://{baseUrl}
  variables:
    baseUrl:
      default: app.contrastsecurity.com
      description: The base URL of your Contrast instance
tags:
- name: Scans
  description: Creates and retrieves scan information.
- name: Projects
  description: Create, update, and view information for projects. Projects are containers
    for artifacts that you want to scan.
- name: Raw Results
  description: Provides raw results in SARIF file format or a single scan.
- name: Upload
  description: Upload code artifacts (files) for scanning.
- name: Single Scan Results
  description: Provides the results of a single scan. Includes information about the
    data flow in an application and reports vulnerabilities that it discovers.
- name: Scan Results
  description: Provides rolled-up results for a project.
paths:
  /v1/organizations/{organizationId}/projects/{projectId}:
    get:
      tags:
      - Projects
      summary: Get a Project
      operationId: getProject
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Request successful
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/V1ProjectResponse'
        '400':
          description: Bad request
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/V1ProjectResponse'
        '404':
          description: Resource not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/V1ProjectResponse'
        '403':
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/V1ProjectResponse'
      x-public: true
      description: Get a Project
  /v1/organizations/{organizationId}/projects/{projectId}/scans/{scanId}/label:
