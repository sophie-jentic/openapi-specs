          description: Unique identifier for an Organization.
          example: 60297108-3b1d-423e-9b78-6bc56f90aca7
          readOnly: true
        projectId:
          type: string
          format: uuid
          description: Unique identifier for a Project.
          example: aa7dd5e6-b5d5-4c83-8b48-576882f763a7
          readOnly: true
        ruleId:
          type: string
          description: Vulnerability rule identifier.
          example: sql-injection
          readOnly: true
        message:
          $ref: '#/components/schemas/V1Message'
          description: Message providing information regarding the Vulnerability.
          example: sql-injection in SqlInjectionLesson6a.injectableQuery() reachable
            from SqlInjectionLesson6a.completed()
          readOnly: true
        level:
          type: string
          description: Vulnerability level determined by the ruleId.
          example: error
          readOnly: true
        severity:
          type: string
          description: Severity of the Vulnerability based on ruleId.
          enum:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW
          - NOTE
          example: CRITICAL
          readOnly: true
        codeFlows:
          type: array
          description: Execution path details that illustrate a possible problem in
            the code.
          items:
            $ref: '#/components/schemas/V1CodeFlow'
          readOnly: true
        locations:
          type: array
          description: An array of locations where the result occurred.
          items:
            $ref: '#/components/schemas/V1Location'
          readOnly: true
        cwe:
          type: array
          description: List of links to Common Weakness Enumerations (CWE).
          example: https://cwe.mitre.org/data/definitions/89.html
          items:
            type: string
          readOnly: true
        owasp:
          type: array
          description: List of links to Open Web Application Security Project (OWASP).
          example: https://owasp.org/www-project-top-ten/OWASP_Top_Ten_2017/Top_10-2017_A1-Injection
          items:
            type: string
          readOnly: true
        reference:
          type: array
          description: ''
          example: https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html
          items:
            type: string
          readOnly: true
        learn:
          type: array
          description: List of links containing learning material regarding the Vulnerability.
          example: https://owasp.org/Top10/A03_2021-Injection
          items:
            type: string
          readOnly: true
        name:
          type: string
          description: Vulnerability rule name.
          example: SQL Injection
          readOnly: true
        risk:
          type: string
          description: Vulnerability risk level.
          example: SQL injection is possible when developers hand-build SQL statements
            containing user-supplied data without validation or encoding....
          readOnly: true
        description:
          type: string
          description: Vulnerability rule description.
          example: Verifies that no untrusted data is used in dynamic database queries.
          readOnly: true
        recommendation:
          type: string
          description: Recommended actions to take to resolve the Vulnerability.
          example: The most effective method of stopping SQL injection attacks is
            to only use an Object-Relational Mapping (ORM) like Hibernate that safely
            handles database interaction....
          readOnly: true
        issue:
          type: string
          description: A short explanation regarding the Vulnerability.
          readOnly: true
        advice:
          type: string
          description: A short example explaining how to resolve the Vulnerability.
          readOnly: true
      required:
      - advice
      - codeFlows
      - cwe
      - description
      - id
      - issue
      - learn
      - level
      - locations
      - message
      - name
      - organizationId
      - owasp
      - projectId
      - recommendation
      - reference
      - risk
      - ruleId
      - scanId
      - severity
