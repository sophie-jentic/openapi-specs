security:
- Contrast-API-Key: []
  Authorization: []
components:
  securitySchemes:
    Contrast-API-Key:
      type: apiKey
      in: header
      name: API-Key
    Authorization:
      type: apiKey
      in: header
      name: Authorization
  schemas:
    V1ProjectRequest:
      type: object
      properties:
        name:
          type: string
          description: Unique Name for a Project.
          example: 'Dev team Java Project #1'
          maxLength: 255
          minLength: 3
        language:
          type: string
          description: Programming Language associated with the Project.
          enum:
          - JAVA
          - JAVASCRIPT
          - DOTNET
          - PYTHON
          - GO
          - ASPNET
          - ASP
          - C
          - CPP
          - PHP
          - KOTLIN
          - SCALA
          - COBOL
          - JSP
          - HTML
          - COMPOSITE
          - VBNET
          - ABAP
          - RUBY
          - RUST
          - TERRAFORM
          - HCL
          - UNKNOWN
          example: JAVA
        archived:
          type: boolean
          description: Project has been Archived.
          example: true
        resourceGroups:
          type: array
          description: List of resource groups to associate with the Project.
          example: '[''RESOURCE_GROUP_1'', ''RESOURCE_GROUP_2'']'
          items:
            type: string
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Metadata values to associate with the Project.
          example: 'owner: Bob'
      required:
      - name
    V1ProjectResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for a Project.
          example: aa7dd5e6-b5d5-4c83-8b48-576882f763a7
          readOnly: true
        organizationId:
          type: string
          format: uuid
          description: Unique identifier for an Organization.
          example: 60297108-3b1d-423e-9b78-6bc56f90aca7
          readOnly: true
        name:
          type: string
          description: Unique Name for a Project.
          example: 'Dev team Java Project #1'
          readOnly: true
        archived:
          type: boolean
          description: Project has been Archived.
          example: false
          readOnly: true
        language:
          type: string
          description: Programming Language associated with the Project.
          example: JAVA
          readOnly: true
        critical:
          type: integer
          format: int32
          description: Number of Critical Vulnerabilities associated with the Project.
          example: 0
          readOnly: true
        high:
          type: integer
          format: int32
          description: Number of High Vulnerabilities associated with the Project.
          example: 1
          readOnly: true
        medium:
          type: integer
          format: int32
          description: Number of Medium Vulnerabilities associated with the Project.
          example: 2
          readOnly: true
        low:
          type: integer
          format: int32
          description: Number of Low Vulnerabilities associated with the Project.
          example: 3
          readOnly: true
        note:
          type: integer
          format: int32
          description: Number of Notable Vulnerabilities associated with the Project.
          example: 4
          readOnly: true
        lastScanTime:
          type: string
          format: date-time
          description: Time of the last Scan ran against the Project.
          example: 2022-01-01 12:15:30.100000+00:00
          readOnly: true
        completedScans:
          type: integer
          format: int32
          description: Total number of completed Scans for the Project.
          example: 1
          readOnly: true
        lastScanId:
          type: string
          format: uuid
          description: Unique Identifier for the last Scan ran against the Project.
          example: e0c1eae3-39b3-4323-9c1d-0f590d4ee7c6
