    EffectiveConfigurationValueDto:
      type: object
      description: A single effective configuration value.
      properties:
        canonicalName:
          type: string
          description: The canonical name of the configuration setting.
          example: agent.java.security.assess.enable
        name:
          type: string
          description: The short name of the configuration setting.
          example: assess.enable
        value:
          type: string
          description: The actual value of the configuration setting.
          example: 'true'
        source:
          type: string
          description: The source of the configuration value.
          example: LOCAL_PROPERTIES
        filename:
          type: string
          description: The filename where the configuration was defined, if applicable.
          example: /app/contrast_security.yaml
    EffectiveConfigurationSettingDto:
      type: object
      description: A configuration setting from various sources.
      properties:
        canonicalName:
          type: string
          description: The canonical name of the configuration setting.
          example: agent.java.security.assess.enable
        name:
          type: string
          description: The name of the configuration setting as it appears in the
            source.
          example: assess.enable
        value:
          type: string
          description: The actual value of the configuration setting.
          example: 'true'
