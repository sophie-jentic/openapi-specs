openapi: 3.0.1
info:
  title: Contrast Agent Dashboard API
  description: Contrast Agent Dashboard API for viewing and managing agents deployed
    by your organization in Contrast. See Contrast Documentation (https://docs.contrastsecurity.com/en/agents.html)
    for more information.
  version: 4.0.0
  x-logo:
    url: /logo.svg
    href: /
  contact:
    name: API Support
servers:
- url: https://{baseUrl}
  variables:
    baseUrl:
      default: app.contrastsecurity.com
      description: The base URL of your Contrast instance
security:
- Contrast-API-Key: []
  Authorization: []
paths:
  /api/v4/organizations/{organizationId}/agents/latest-versions:
    get:
      tags:
      - Agent Versions
      summary: Get latest agent versions
      description: Gets the latest version of each language's agent available for
        download from public repositories for an organization by ID.
      operationId: getLatestAgentVersions
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        example: 2411f46c-7f57-426e-be61-82d583722c8d
      responses:
        '200':
          description: Request successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentLatestVersions'
              examples:
                Example:
                  summary: Successful example
                  value:
                    agents:
                    - language: PHP
                      latestVersion: 1.41.0
                      publishedDate: '2025-05-01T16:03:40.052Z'
                    - language: GO
                      latestVersion: 8.0.0
                      publishedDate: '2025-05-22T17:28:45.999Z'
                    - language: DOTNET_CORE
                      latestVersion: 4.4.0
                      publishedDate: '2025-05-13T19:05:46.343Z'
                    - language: DOTNET
                      latestVersion: 51.2.0
                      publishedDate: '2025-05-13T19:05:21.663Z'
                    - language: NODE
                      latestVersion: 5.35.1
                      publishedDate: '2025-05-12T15:03:01.055Z'
                    - language: RUBY
                      latestVersion: 7.6.1
                      publishedDate: '2024-05-30T00:00:00Z'
                    - language: JAVA
                      latestVersion: 6.17.0
                      publishedDate: '2025-05-22T17:26:45Z'
                    date: '2025-05-22T19:58:17.087Z'
        '401':
          $ref: '#/components/responses/Unauthorized401'
        '403':
          $ref: '#/components/responses/Forbidden403'
  /api/v4/organizations/{organizationId}/agents:
    get:
      tags:
      - Agents
      summary: Get all agents
      description: Retrieves a paginated list of all agents for an organization with
        optional filtering.
      operationId: getAllAgents
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        example: 3cfd04fc-f887-4894-a8fb-ce159fccbe06
      - name: applications
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
        description: Filter by application IDs.
        example:
        - 3cfd04fc-f887-4894-a8fb-ce159fccbe06
        - 40475a62-3f7a-4c55-95bf-492dfc096ece
      - name: languages
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/LanguageEnum'
        description: Filter by programming languages.
        example:
        - JAVA
        - PYTHON
      - name: environments
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentEnum'
        description: Filter by environments.
        example:
        - DEVELOPMENT
        - PRODUCTION
      - name: servers
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        description: Filter by server IDs.
        example:
        - 1
        - 2
      - name: hostnames
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by hostnames from server inventory.
        example:
        - server-01
        - server-02
      - name: status
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/StatusEnum'
        description: 'Filter by agent status. Status is determined by the last active
          time:

          - **ONLINE**: Last active time is within 5 minutes from the current time

          - **TERMINATED**: Last active time is null or more than 5 minutes from the
          current time

          '
        example:
        - ONLINE
        - TERMINATED
      - name: isOverridden
        in: query
        required: false
        schema:
          type: boolean
        description: Filter by whether the agent configuration is overridden.
        example: true
      - name: isOutdated
        in: query
        required: false
        schema:
          type: boolean
        description: Filter by whether the agent version is outdated.
        example: false
      - name: agentKeys
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by agent keys (agent user UIDs).
        example:
        - default
        - custom-key
      - name: filterText
        in: query
        required: false
        schema:
          type: string
        description: General query filter to search across multiple fields (case-insensitive,
          wildcard matching).
        example: webapp
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 0
        description: Zero-based page index for pagination.
        example: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          default: 20
        description: The size of the page to be returned.
        example: 50
      - name: sort
        in: query
        required: false
        schema:
          type: string
        description: 'Sort field and direction. Format: fieldName,direction where
          direction is either ''asc'' or ''desc''.

          Allowed fields: lastActive, hostname, and other Agent entity fields.

          '
        example: lastActive,desc
      responses:
        '200':
          description: Request successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAgentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized401'
        '403':
          $ref: '#/components/responses/Forbidden403'
