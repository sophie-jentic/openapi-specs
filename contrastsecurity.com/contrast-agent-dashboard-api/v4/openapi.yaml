components:
  schemas:
    AgentVersion:
      type: object
      description: Information about a specific agent version release.
      required:
      - language
      - latestVersion
      - publishedDate
      properties:
        language:
          description: The programming language of the agent.
          example: GO
          allOf:
          - $ref: '#/components/schemas/LanguageEnum'
        latestVersion:
          type: string
          description: The most recently published version of the agent.
          format: Semantic Version
          pattern: ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$
          example: 8.0.0
        publishedDate:
          type: string
          description: The date the agent was released; YYYY-MM-DDTHH:MM:SS.SSSZ
          format: date-time
          example: '2025-05-01T16:03:40.052Z'
    AgentLatestVersions:
      type: object
      description: Information about the latest available agent versions for each
        language.
      required:
      - agents
      - date
      properties:
        agents:
          type: array
          description: List of agent versions for each language.
          items:
            $ref: '#/components/schemas/AgentVersion'
        date:
          type: string
          description: The date the agent versions were retrieved; YYYY-MM-DDTHH:MM:SS.SSSZ
          format: date-time
          example: '2025-05-01T19:53:16.629Z'
    LanguageEnum:
      type: string
      enum:
      - JAVA
      - DOTNET
      - DOTNET_CORE
      - NODE
      - PHP
      - PYTHON
      - GO
      - RUBY
      - FLEX
    EnvironmentEnum:
      type: string
      enum:
      - DEVELOPMENT
      - QA
      - PRODUCTION
    StatusEnum:
      type: string
      enum:
      - ONLINE
      - TERMINATED
    ServerInventoryDTO:
      type: object
      description: Server inventory information including cloud resource metadata
        and host details.
      properties:
        agentReportingInstanceId:
          type: string
          description: The agent instance ID.
          example: 909d1262-6f52-425f-9010-105082046e7a
        organizationId:
          type: string
          format: uuid
          description: The organization UUID.
          example: 3cfd04fc-f887-4894-a8fb-ce159fccbe06
        serverUuid:
          type: string
          format: uuid
          description: The server UUID.
          example: dac3f52c-3f36-4ead-a26b-adeadc4d72f1
        cloudResourceId:
          type: string
          description: The cloud resource ID of the host.
          example: i-0123456789abcdef0
        cloudResourceProvider:
          type: string
          description: The cloud resource provider (e.g., AWS, Azure, GCP).
          example: AWS
        operatingSystem:
          type: string
          description: The operating system running on the host.
          example: Linux
        runtimePath:
          type: string
          description: The path of the runtime executable used to start the agent.
          example: /usr/bin/java
        runtimeVersion:
          type: string
          description: The version of the runtime executable.
          example: 17.0.5
        hostname:
          type: string
          description: The hostname of the host running the agent.
          example: server-01
        isKubernetes:
          type: boolean
          description: Whether the host is running on Kubernetes.
          example: false
        isDocker:
          type: boolean
          description: Whether the host is running on Docker.
          example: true
    AgentDTO:
      type: object
      description: Data transfer object representing an agent with all its properties.
      properties:
        id:
          type: string
          description: The unique ID of the agent.
          example: abc123
        organizationId:
          type: string
          format: uuid
          description: The organization ID.
          example: 3cfd04fc-f887-4894-a8fb-ce159fccbe06
        agentReportingInstanceId:
          type: string
          format: uuid
          description: The agent reporting instance ID.
          example: 909d1262-6f52-425f-9010-105082046e7a
        language:
          description: Programming language of the agent.
          example: JAVA
          allOf:
          - $ref: '#/components/schemas/LanguageEnum'
        serverId:
          type: integer
          description: The server ID.
          example: 1
        serverUuid:
          type: string
          format: uuid
          description: The server UUID.
          example: dac3f52c-3f36-4ead-a26b-adeadc4d72f1
        serverName:
          type: string
          description: The server name.
          example: app-server-01
        environment:
          description: Environment where the agent is running.
          example: PRODUCTION
          allOf:
