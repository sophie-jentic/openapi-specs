  /api/v4/organizations/{organizationId}/agents/{agentInstanceId}/applications/{applicationId}:
    get:
      tags:
      - Agents
      summary: Get a specific agent by instance ID and application ID
      description: Retrieves a specific agent by its reporting instance ID and application
        ID.
      operationId: getAgentByApplicationIdAndInstanceId
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        example: 3cfd04fc-f887-4894-a8fb-ce159fccbe06
      - name: agentInstanceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The agent reporting instance ID.
        example: 909d1262-6f52-425f-9010-105082046e7a
      - name: applicationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The application ID.
        example: 9c3b636b-c409-4d2b-9674-71c10f869294
      responses:
