  parameters:
    OranizationID:
      in: path
      name: organizationId
      required: true
      description: Organization ID in Contrast web interface. Located under User menu
        > User Settings > Profile.
      example: abxabcde-1234-1234-abc5-123456789abc
      schema:
        type: string
        format: uuid
    AccountID:
      in: path
      name: accountId
      required: true
      description: Cloud Provider Account ID. Must be 12 numerical characters.
      example: '123456789012'
      schema:
        type: string
        pattern: ^\d{12}$
    Provider:
      in: path
      name: provider
      required: true
      description: Cloud Provider aws/azure
      example: aws
      schema:
        type: string
        enum:
        - aws
        - azure
    AccountID1:
      in: path
      name: accountId
      required: true
      description: Cloud Provider Account ID. Must be 12 numerical characters.
      example: 123456789012
      schema:
        type: string
        pattern: ^\d{12}$
    AccountID2:
      in: path
      name: accountId
      description: AWS Account ID or Azure Subscription ID. Must be 12 numerical characters.
      required: true
      example: '123456789012'
      schema:
        type: string
        pattern: ^\d{12}$
  requestBodies:
    requestPostScan:
      content:
        application/json:
          schema:
            required:
            - resources
            properties:
              scanConfiguration:
                $ref: '#/components/schemas/scanConfiguration'
              resources:
                description: ARNs of cloud resources to be scanned.
                type: array
                items:
                  type: string
          examples:
            functions arns:
              value:
                scanConfiguration:
                  static: true
                  dynamic: true
                resources:
                - arn:aws:lambda:eu-central-1:123456789123:function:function-name-1
                - arn:aws:lambda:eu-central-1:123456789123:function:function-name-2
